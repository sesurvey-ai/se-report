<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Report — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a; color: #e2e8f0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        body.light { background: #f1f5f9; color: #1e293b; }

        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 32px 28px;
            width: 100%; max-width: 380px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
        }
        body.light .login-card {
            background: #fff; border-color: #e2e8f0;
            box-shadow: 0 12px 32px rgba(15,23,42,0.12);
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-header h1 {
            font-size: 22px; font-weight: 700; color: #f1f5f9;
            letter-spacing: 0.5px;
        }
        body.light .login-header h1 { color: #0f172a; }
        .login-header p {
            margin-top: 6px;
            font-size: 13px; color: #94a3b8;
        }
        body.light .login-header p { color: #64748b; }

        form { display: flex; flex-direction: column; gap: 14px; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label {
            font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: #94a3b8;
        }
        body.light .field label { color: #475569; }
        .field input {
            padding: 10px 12px; font-size: 14px;
            background: #0f172a; color: #e2e8f0;
            border: 1px solid #475569; border-radius: 8px;
            font-family: inherit;
        }
        body.light .field input {
            background: #f8fafc; color: #0f172a; border-color: #cbd5e1;
        }
        .field input:focus {
            outline: none; border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        button.submit {
            margin-top: 6px;
            padding: 11px 18px; font-size: 14px; font-weight: 600;
            background: #3b82f6; color: #fff;
            border: 1px solid #3b82f6; border-radius: 8px;
            cursor: pointer; transition: background 0.15s;
            font-family: inherit;
        }
        button.submit:hover { background: #2563eb; border-color: #2563eb; }
        button.submit:active { background: #1d4ed8; }

        .error {
            background: rgba(248,113,113,0.12);
            border: 1px solid rgba(248,113,113,0.4);
            color: #fca5a5;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
        }
        body.light .error {
            background: #fef2f2; border-color: #fecaca; color: #b91c1c;
        }

        .hint {
            margin-top: 16px;
            font-size: 12px; color: #64748b;
            text-align: center; line-height: 1.5;
        }
        body.light .hint { color: #94a3b8; }

        .version {
            position: fixed;
            bottom: 10px;
            right: 14px;
            font-size: 11px;
            color: #475569;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            letter-spacing: 0.5px;
            user-select: none;
            pointer-events: none;
        }
        body.light .version { color: #94a3b8; }
        @media (max-width: 480px) {
            .version { font-size: 10px; bottom: 6px; right: 8px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>SE Report</h1>
            <p>ลงชื่อเข้าใช้ด้วยบัญชี iSurvey ของคุณ</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" autocomplete="on">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       value="{{ username or '' }}"
                       autocomplete="username" autofocus required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="submit">เข้าสู่ระบบ</button>
        </form>

        <p class="hint">
            ใช้ username / password เดียวกับที่ login เข้า iSurvey
        </p>
    </div>

    <div class="version">v{{ app_version }}</div>

    <script>
        // Honour the persisted theme so the login page matches the rest of
        // the app (theme is set from the main view; default is light).
        // Only switch to dark when the user has explicitly chosen it —
        // missing localStorage means "default" which is light.
        if (localStorage.getItem('se_theme') !== 'dark') {
            document.body.classList.add('light');
        }
    </script>
</body>
</html>
