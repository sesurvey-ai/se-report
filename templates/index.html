<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>SE Report</title>
    <!-- SheetJS, jQuery + jQuery UI + PivotTable.js + Plotly, and Univer
         are ALL lazy-loaded on demand. SheetJS (~1.4 MB) is loaded the
         first time the user clicks Export / Save as XLSX / Open xlsx —
         saves the download for users who only browse the table view.
         See loadSheetJsAssets / loadPivotAssets / loadUniverAssets in
         the inline script below. -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a; color: #e2e8f0;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px; min-width: 260px; background: #1e293b;
            border-right: 1px solid #334155; display: flex; flex-direction: column;
            transition: margin-left 0.3s ease;
        }
        .sidebar.collapsed { margin-left: -260px; }
        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-close {
            background: none; border: none; color: #64748b; font-size: 20px;
            cursor: pointer; line-height: 1;
        }
        .sidebar-close:hover { color: #e2e8f0; }
        .sidebar-actions {
            display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid #334155;
        }
        .sidebar-actions button {
            flex: 1; padding: 6px; font-size: 11px; border-radius: 6px;
            border: 1px solid #475569; background: transparent; color: #94a3b8;
            cursor: pointer; transition: all 0.15s;
        }
        .sidebar-actions button:hover { background: #334155; color: #e2e8f0; }
        .col-list {
            list-style: none; flex: 1; overflow-y: auto; padding: 8px 12px;
        }
        .col-list li { padding: 1px 0; }
        .col-list label {
            font-size: 13px; cursor: pointer; display: flex; align-items: center;
            gap: 8px; padding: 5px 8px; border-radius: 6px; transition: background 0.15s;
            color: #cbd5e1;
        }
        .col-list label:hover { background: #334155; }
        .col-list input[type=checkbox] { accent-color: #3b82f6; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Toolbar */
        .toolbar {
            padding: 16px 24px; background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .toolbar-toggle {
            background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 20px; padding: 4px; display: flex; align-items: center;
        }
        .toolbar-toggle:hover { color: #e2e8f0; }
        .toolbar-toggle svg { width: 22px; height: 22px; }
        .toolbar h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-right: auto; }
        .toolbar input[type=date] {
            padding: 7px 12px; border: 1px solid #475569; border-radius: 8px;
            background: #0f172a; color: #e2e8f0; font-size: 13px;
        }
        .toolbar input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
        .toolbar-label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .toolbar-group { display: flex; align-items: center; gap: 8px; }

        /* Radio pills */
        .pill-group { display: flex; gap: 0; }
        .pill-group input { display: none; }
        .pill-group label {
            padding: 7px 16px; font-size: 13px; cursor: pointer;
            background: #0f172a; border: 1px solid #475569; color: #94a3b8;
            transition: all 0.15s;
        }
        .pill-group label:first-of-type { border-radius: 8px 0 0 8px; }
        .pill-group label:last-of-type { border-radius: 0 8px 8px 0; border-left: none; }
        .pill-group input:checked + label {
            background: #3b82f6; border-color: #3b82f6; color: #fff;
        }

        /* Fetch button */
        .btn-fetch {
            padding: 7px 28px; background: #a855f7; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.15s;
        }
        .btn-fetch:hover { background: #9333ea; }
        .btn-fetch:disabled { background: #3b2354; color: #64748b; cursor: not-allowed; }

        /* Progress bar */
        .progress-container {
            display: none; align-items: center; gap: 12px; margin-bottom: 12px;
        }
        .progress-container.active { display: flex; }
        .progress-bar-wrap {
            flex: 1; height: 8px; background: #334155; border-radius: 4px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; width: 0%; background: #3b82f6; border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-text { font-size: 12px; color: #94a3b8; min-width: 180px; }
        .btn-cancel {
            padding: 5px 16px; background: #dc2626; color: #fff; border: none;
            border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .btn-cancel:hover { background: #b91c1c; }

        /* Export Excel — icon variant that lives inside .toolbar-controls
           and inherits the 32×32 frame from `.toolbar-controls button`.
           Tinted green so it still reads as the primary export action
           rather than just another utility icon. Hidden until a Fetch
           populates lastRecords (toggled by JS via inline-flex). */
        .toolbar-controls button.toolbar-export {
            display: none;
            border-color: #22c55e; color: #22c55e;
        }
        .toolbar-controls button.toolbar-export:hover {
            background: #22c55e; color: #fff; border-color: #22c55e;
        }
        body.light .toolbar-controls button.toolbar-export {
            border-color: #16a34a; color: #16a34a;
        }
        body.light .toolbar-controls button.toolbar-export:hover {
            background: #16a34a; color: #fff; border-color: #16a34a;
        }

        /* Content area */
        .content { flex: 1; overflow: auto; padding: 16px 24px; display: flex; flex-direction: column; }
        #status { margin-bottom: 12px; font-size: 13px; color: #94a3b8; }
        #status.error { color: #f87171; }

        /* Table */
        table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            background: #1e293b; border-radius: 10px; overflow: hidden;
        }
        thead { position: sticky; top: 0; z-index: 10; }
        thead th {
            background: #334155; color: #94a3b8; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 10px 14px; text-align: left; font-weight: 600;
            border-bottom: 1px solid #475569;
            position: relative; cursor: pointer; user-select: none;
        }
        thead th .th-content {
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
        }
        thead th .filter-icon {
            width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0;
            transition: opacity 0.15s;
        }
        thead th:hover .filter-icon { opacity: 0.8; }
        thead th.filtered .filter-icon { opacity: 1; color: #3b82f6; }
        td {
            padding: 9px 14px; font-size: 13px; color: #cbd5e1;
            border-bottom: 1px solid #1e293b; white-space: nowrap;
        }
        tbody tr { background: #0f172a; transition: background 0.1s; }
        tbody tr:nth-child(even) { background: #162032; }
        tbody tr:hover { background: #1e3a5f; }
        tbody tr.virtual-spacer,
        tbody tr.virtual-spacer:hover { background: transparent !important; }
        tbody tr.virtual-spacer td { padding: 0 !important; border: none !important; }

        /* Filter dropdown */
        .filter-dropdown {
            position: fixed; min-width: 240px;
            background: #1e293b; border: 1px solid #475569; border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200;
            padding: 8px 0;
        }
        .filter-dropdown .fd-search {
            padding: 0 10px 8px; border-bottom: 1px solid #334155; margin-bottom: 4px;
        }
        .filter-dropdown .fd-search input {
            width: 100%; padding: 6px 10px; font-size: 12px;
            background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
            border-radius: 6px; outline: none;
        }
        .filter-dropdown .fd-search input:focus { border-color: #3b82f6; }
        .filter-dropdown .fd-search input::placeholder { color: #64748b; }
        .filter-dropdown .fd-list {
            max-height: 200px; overflow-y: auto; padding: 0 6px;
        }
        /* Select All header — pinned above the virtual scroll container so
           it doesn't recycle out of view on long lists. */
        .filter-dropdown .fd-selall {
            padding: 0 6px 6px;
            border-bottom: 1px solid #334155;
            margin-bottom: 4px;
        }
        /* fd-row is used for every checkbox row (Select All + each value).
           Height is fixed at 26px so the virtual scroller's row-math stays
           in sync with what's actually painted. */
        .filter-dropdown .fd-row {
            display: flex; align-items: center; gap: 8px;
            height: 26px; padding: 0 8px; font-size: 12px; color: #cbd5e1;
            border-radius: 4px; cursor: pointer; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
            box-sizing: border-box;
        }
        .filter-dropdown .fd-row:hover { background: #334155; }
        .filter-dropdown .fd-row input[type=checkbox] { accent-color: #3b82f6; flex-shrink: 0; }
        .filter-dropdown .fd-actions {
            display: flex; gap: 6px; padding: 8px 10px 4px;
            border-top: 1px solid #334155; margin-top: 4px;
        }
        .filter-dropdown .fd-actions button {
            flex: 1; padding: 5px; font-size: 11px; border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-dropdown .fd-ok {
            background: #3b82f6; color: #fff; border: none;
        }
        .filter-dropdown .fd-ok:hover { background: #2563eb; }
        .filter-dropdown .fd-cancel {
            background: transparent; color: #94a3b8; border: 1px solid #475569;
        }
        .filter-dropdown .fd-cancel:hover { background: #334155; color: #e2e8f0; }

        /* Spreadsheet (Univer) — theme-immune.
           Univer's filter dropdowns and popovers inherit `color` from
           ancestors. When the app runs in dark theme, body's light text
           color can bleed through making popovers nearly invisible. The
           whole spreadsheet subtree is forced to an always-light palette
           so it stays readable regardless of the dark/light toggle. */
        #spreadsheetView {
            display: none;
            flex: 1; min-height: 0;
            flex-direction: column;
            color: #1e293b;  /* break dark-theme color inheritance */
        }
        /* Crosshair toggle injected as a 5th tab in Univer's tab bar
           (next to Start/Insert/Formulas/Data). Sits in the same flex row
           as the real tabs but does NOT carry role="tab" so Univer's
           ribbon doesn't try to switch panels when it's clicked.
           Default styling mirrors the real tabs at rest; amber "active"
           palette when the highlight is on — same visual story as the
           fast-user chip in the page header. */
        .univer-crosshair-tab {
            padding: 4px 12px;
            font-size: 13px;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            line-height: 1.2;
            white-space: nowrap;
        }
        .univer-crosshair-tab:hover { background: rgba(15, 23, 42, 0.06); }
        .univer-crosshair-tab.active {
            background: #fef3c7;
            border-color: #fbbf24;
            color: #92400e;
        }
        .univer-crosshair-tab.active:hover { background: #fde68a; }
        /* File-ops button group injected at the head of Univer's ribbon row
           (left of Undo). Holds Refresh Data / Open / Save / Save XLSX +
           a dirty indicator. Visual style mirrors Univer's own buttons —
           a thin border + light hover — except Save which is the page's
           primary action and gets the blue palette. */
        .se-file-ops {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 6px;
            margin-right: 6px;
            border-right: 1px solid #e5e7eb;
            height: 28px;
            width: max-content;
            flex-shrink: 0;
            background: #fff;
        }
        /* When the file-ops wrap is a direct grid-child of the ribbon row,
           override the row's grid template so our wrap gets just its
           content width and Univer's inner ribbon claims the remaining
           1fr. Without this Univer assigns the inner div to min-content
           (~32px → only the overflow ⋮ shows) and gives the rest to us. */
        .se-ribbon-has-fileops {
            grid-template-columns: max-content 1fr !important;
        }
        .se-file-ops button {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 8px;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: transparent;
            color: #1e293b;
            cursor: pointer;
            font-family: inherit;
            line-height: 1.4;
        }
        .se-file-ops button:hover { background: #f1f5f9; }
        .se-file-ops button svg {
            width: 16px; height: 16px;
            display: block; flex-shrink: 0;
        }
        /* Refresh icon (Refresh Data button) — green to signal "load fresh" */
        .se-file-ops button[data-op="refresh"] svg { color: #16a34a; }
        /* Save / Save XLSX get colored icons + a transparent button so the
           icon carries the visual weight (no more blue-filled Save). */
        .se-file-ops button[data-op="save"] svg { color: #2563eb; }
        .se-file-ops button[data-op="savexlsx"] svg { color: #16a34a; }
        /* Print button — neutral slate so it doesn't compete with the
           coloured save/refresh icons. */
        .se-file-ops button[data-op="print"] svg { color: #475569; }
        /* Status indicator lives in the Univer tab bar but is pinned to
           the LEFT edge with absolute positioning so it visually sits
           above the "ข้อมูล" refresh button (which is the leftmost item
           in the ribbon row below). The tab bar's tab buttons (เมนู /
           สูตร / โฟกัส) stay center-aligned because the indicator is out
           of flex flow. The parent tab bar is forced to position:
           relative in JS (injectCrosshairTab) so this anchoring works. */
        #sheetDirtyIndicator {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px;
            color: #16a34a;
            font-weight: 500;
            user-select: none;
            line-height: 1.2;
        }
        #sheetDirtyIndicator.dirty { color: #dc2626; }
        #sheetDirtyIndicator::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        #univerHost {
            flex: 1; min-height: 300px;
            position: relative;
            background: #fff;
            border: 1px solid #e2e8f0; border-radius: 8px;
            overflow: hidden;
            color: #1e293b;
        }
        #univerMount { width: 100%; height: 100%; }
        /* Univer portals popovers / menus / dialogs to body via the
           univer-root class. Force a light palette there so the app's
           dark theme doesn't bleed into them. */
        .univer-root,
        .univer-root *,
        .univer-portal,
        .univer-portal * {
            color: #1e293b;
        }
        .univer-portal {
            background: transparent;
        }
        #sheetLoadingOverlay {
            display: none;
            position: absolute; inset: 0;
            background: rgba(241, 245, 249, 0.9);
            z-index: 10;
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }
        #sheetLoadingOverlay.visible { display: flex; }
        /* While the Univer assets are loading on first entry, the
           empty-state placeholder ("ยังไม่มีข้อมูล — กรุณา Fetch ก่อน...")
           sits behind a 90%-opaque overlay and bleeds through the gap
           between the spinner and the overlay's loading text. Hide the
           empty placeholder for as long as the overlay is shown so the
           two messages don't visually collide. */
        #sheetLoadingOverlay.visible ~ #sheetEmptyMessage { display: none; }
        .sheet-loading-text { color: #475569; font-size: 13px; }
        .sheet-spinner {
            width: 36px; height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: sheet-spin 0.8s linear infinite;
        }
        @keyframes sheet-spin { to { transform: rotate(360deg); } }
        #sheetEmptyMessage {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            pointer-events: none;
        }
        #sheetEmptyMessage.hidden { display: none; }
        #sheetEmptyMessage > .sheet-empty-text {
            max-width: 520px;
            text-align: center;
            color: #94a3b8; font-size: 14px; line-height: 1.7;
            pointer-events: auto;
        }
        #sheetEmptyMessage .sheet-empty-text b { color: #334155; }
        /* Inline Open button inside the empty-state message so the user can
           load a saved workbook before any data has been fetched (the real
           Open button lives in the Univer ribbon which only renders once a
           workbook is mounted — chicken-and-egg without this). */
        .sheet-empty-open-btn {
            display: inline-block; margin: 12px 0 0;
            padding: 6px 18px; font-size: 13px; font-family: inherit;
            background: #2563eb; color: #fff;
            border: 1px solid #1d4ed8; border-radius: 4px;
            cursor: pointer; line-height: 1.4;
        }
        .sheet-empty-open-btn:hover { background: #1d4ed8; }

        /* Pivot dark theme */
        #pivotView { overflow: auto; }
        /* Establish a positioning context so filter dropdowns reparented to
           #pivotOutput resolve their absolute top/left against this box. */
        #pivotOutput { position: relative; }
        #pivotOutput .pvtUi { color: #e2e8f0; background: transparent; border: none; }
        #pivotOutput .pvtUi td, #pivotOutput .pvtUi th { background: transparent; }
        #pivotOutput select, #pivotOutput .pvtSearch input {
            background: #1e293b; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px;
            padding: 4px 6px;
        }
        #pivotOutput .pvtAxisContainer, #pivotOutput .pvtVals {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px;
        }
        /* Wrap field pills across multiple rows in the Unused column so a
           wider column shows more pills per row and the user doesn't have to
           scroll vertically to find a field. Only applied to pvtUnused —
           display: flex on the empty pvtRows td escapes the table layout. */
        #pivotOutput td.pvtUnused.pvtAxisContainer {
            display: flex; flex-wrap: wrap; align-content: flex-start;
            gap: 4px;
        }
        #pivotOutput td.pvtUnused.pvtAxisContainer li {
            margin: 0; list-style: none;
        }
        #pivotOutput .pvtAxisContainer li span.pvtAttr {
            background: #334155; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px;
            padding: 4px 10px; font-size: 12px;
            white-space: nowrap; display: inline-block;
        }
        #pivotOutput .pvtAxisContainer li span.pvtAttr:hover { background: #3b82f6; border-color: #3b82f6; }
        #pivotOutput table.pvtTable {
            background: #1e293b; border-collapse: separate; border-spacing: 0;
            border-radius: 8px; overflow: hidden; font-size: 12px;
        }
        #pivotOutput table.pvtTable thead th {
            background: #334155; color: #94a3b8; border: 1px solid #475569;
            padding: 6px 10px; font-weight: 600;
            white-space: normal; word-break: break-word; max-width: 140px;
            line-height: 1.25; vertical-align: middle;
        }
        #pivotOutput table.pvtTable tbody td {
            background: #0f172a; color: #cbd5e1; border: 1px solid #1e293b; padding: 6px 10px;
        }
        #pivotOutput table.pvtTable tbody td.pvtTotal,
        #pivotOutput table.pvtTable tbody th.pvtTotalLabel,
        #pivotOutput table.pvtTable thead th.pvtTotalLabel {
            background: #162032; color: #f1f5f9; font-weight: 700;
        }
        /* ============================================================
           Pivot filter dropdown — redesigned as a sectioned popover.
           Layout: header | search | secondary actions | scroll list | footer.
           Buttons are tagged in JS (.pvt-btn-primary/secondary/ghost) so
           each section can paint them with its own visual weight.
           ============================================================ */
        #pivotOutput .pvtFilterBox {
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            color: #e2e8f0; box-shadow: 0 12px 32px rgba(0,0,0,0.45);
            resize: both; overflow: hidden;
            display: flex; flex-direction: column;
            width: 320px; height: 380px;
            min-width: 240px; min-height: 220px;
            max-width: 95vw; max-height: 90vh;
            padding: 0; /* sections own their padding */
        }
        body.light #pivotOutput .pvtFilterBox {
            background: #fff; border-color: #e2e8f0;
            box-shadow: 0 12px 32px rgba(15,23,42,0.12);
        }
        /* Hide the stray <br> the library inserts between actions and list */
        #pivotOutput .pvtFilterBox > br { display: none; }
        /* Library wraps the search input in a <p>; reset its margin so our
           section paddings stay accurate. */
        #pivotOutput .pvtFilterBox > p { margin: 0; }

        /* ---- Close × (top-right, absolutely positioned over the header) ---- */
        #pivotOutput .pvtFilterBox button.pvt-filter-close {
            position: absolute; top: 8px; right: 8px;
            width: 24px; height: 24px; padding: 0;
            background: transparent; border: none; color: #94a3b8;
            cursor: pointer; z-index: 12;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; line-height: 1; font-family: inherit;
            border-radius: 6px;
        }
        #pivotOutput .pvtFilterBox button.pvt-filter-close:hover {
            background: #334155; color: #e2e8f0;
        }
        body.light #pivotOutput .pvtFilterBox button.pvt-filter-close { color: #64748b; }
        body.light #pivotOutput .pvtFilterBox button.pvt-filter-close:hover {
            background: #f1f5f9; color: #1e293b;
        }

        /* ---- Header (drag handle) ---- */
        #pivotOutput .pvtFilterBox h4 {
            margin: 0; padding: 11px 40px 10px 14px;
            font-size: 13px; font-weight: 600; text-align: left;
            color: #f1f5f9; background: #182334;
            border-bottom: 1px solid #334155;
            cursor: move; user-select: none;
            flex: 0 0 auto;
        }
        body.light #pivotOutput .pvtFilterBox h4 {
            color: #0f172a; background: #f8fafc; border-bottom-color: #e2e8f0;
        }

        /* ---- Search input ---- */
        #pivotOutput .pvtFilterBox input.pvtSearch {
            display: block; box-sizing: border-box;
            width: calc(100% - 24px);
            margin: 8px 12px 0 12px; padding: 7px 10px;
            font-size: 12px; font-family: inherit;
            background: #0f172a; color: #e2e8f0;
            border: 1px solid #334155; border-radius: 6px;
            outline: none; transition: border-color 0.15s;
        }
        #pivotOutput .pvtFilterBox input.pvtSearch:focus {
            border-color: #3b82f6;
        }
        body.light #pivotOutput .pvtFilterBox input.pvtSearch {
            background: #f8fafc; color: #1e293b; border-color: #cbd5e1;
        }

        /* ---- Select All / Select None — ghost buttons, right-aligned ---- */
        #pivotOutput .pvtFilterBox .pvt-filter-actions {
            display: flex; justify-content: flex-end; gap: 10px;
            padding: 2px 10px 6px 10px;
            flex: 0 0 auto;
        }
        #pivotOutput .pvtFilterBox button.pvt-btn-ghost {
            background: transparent; color: #60a5fa;
            border: none; border-radius: 4px;
            padding: 4px 8px; margin: 0;
            font-size: 11px; font-weight: 500;
            cursor: pointer; transition: background 0.12s, color 0.12s;
        }
        #pivotOutput .pvtFilterBox button.pvt-btn-ghost:hover {
            background: #334155; color: #93c5fd;
        }
        body.light #pivotOutput .pvtFilterBox button.pvt-btn-ghost { color: #2563eb; }
        body.light #pivotOutput .pvtFilterBox button.pvt-btn-ghost:hover {
            background: #f1f5f9; color: #1d4ed8;
        }

        /* ---- Checkbox list ---- */
        #pivotOutput .pvtFilterBox .pvtCheckContainer {
            flex: 1 1 auto; min-height: 0;
            overflow-y: auto; padding: 2px 6px 8px 6px;
            border-top: 1px solid #334155;
            height: auto !important; max-height: none !important;
        }
        body.light #pivotOutput .pvtFilterBox .pvtCheckContainer {
            border-top-color: #e2e8f0;
        }
        #pivotOutput .pvtCheckContainer p {
            margin: 0;
        }
        #pivotOutput .pvtCheckContainer label {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 8px; margin: 1px 0;
            color: #cbd5e1; font-size: 12px;
            border-radius: 4px; cursor: pointer;
            transition: background 0.1s;
        }
        #pivotOutput .pvtCheckContainer label:hover {
            background: #334155; color: #f1f5f9;
        }
        body.light #pivotOutput .pvtCheckContainer label { color: #334155; }
        body.light #pivotOutput .pvtCheckContainer label:hover {
            background: #f1f5f9; color: #0f172a;
        }
        /* Custom scrollbar inside the list */
        #pivotOutput .pvtFilterBox .pvtCheckContainer::-webkit-scrollbar { width: 8px; }
        #pivotOutput .pvtFilterBox .pvtCheckContainer::-webkit-scrollbar-track { background: transparent; }
        #pivotOutput .pvtFilterBox .pvtCheckContainer::-webkit-scrollbar-thumb {
            background: #475569; border-radius: 4px;
        }
        #pivotOutput .pvtFilterBox .pvtCheckContainer::-webkit-scrollbar-thumb:hover { background: #64748b; }
        body.light #pivotOutput .pvtFilterBox .pvtCheckContainer::-webkit-scrollbar-thumb {
            background: #cbd5e1;
        }

        /* ---- Footer (Apply / Cancel) ---- */
        #pivotOutput .pvtFilterBox .pvt-filter-footer {
            display: flex; justify-content: flex-end; gap: 12px;
            padding: 10px 12px;
            background: #182334;
            border-top: 1px solid #334155;
            flex: 0 0 auto;
        }
        body.light #pivotOutput .pvtFilterBox .pvt-filter-footer {
            background: #f8fafc; border-top-color: #e2e8f0;
        }
        /* Default library button rule below paints all other buttons blue;
           our tagged variants override. */
        #pivotOutput .pvtFilterBox button {
            background: #3b82f6; color: #fff; border: none; border-radius: 6px;
            padding: 5px 14px; cursor: pointer; font-family: inherit;
        }
        #pivotOutput .pvtFilterBox button.pvt-btn-primary {
            background: #3b82f6; color: #fff;
            border: 1px solid #3b82f6; border-radius: 6px;
            padding: 5px 14px; font-size: 12px; font-weight: 500; margin: 0;
            transition: background 0.12s;
        }
        #pivotOutput .pvtFilterBox button.pvt-btn-primary:hover { background: #2563eb; border-color: #2563eb; }
        #pivotOutput .pvtFilterBox button.pvt-btn-secondary {
            background: transparent; color: #cbd5e1;
            border: 1px solid #475569; border-radius: 6px;
            padding: 5px 14px; font-size: 12px; font-weight: 500; margin: 0;
            transition: background 0.12s, color 0.12s;
        }
        #pivotOutput .pvtFilterBox button.pvt-btn-secondary:hover {
            background: #334155; color: #f1f5f9;
        }
        body.light #pivotOutput .pvtFilterBox button.pvt-btn-secondary {
            color: #475569; border-color: #cbd5e1;
        }
        body.light #pivotOutput .pvtFilterBox button.pvt-btn-secondary:hover {
            background: #f1f5f9; color: #0f172a;
        }
        #pivotOutput .pvtRendererArea { padding: 0; }

        /* Resizable columns: handles live on the right edge of unused + rows cells */
        #pivotOutput table.pvtUi { table-layout: fixed; width: 100%; }
        #pivotOutput td.pvtUnused,
        #pivotOutput td.pvtRows { position: relative; }
        #pivotOutput .pvt-resizer {
            position: absolute; top: 0; bottom: 0; right: -3px; width: 6px;
            cursor: col-resize; z-index: 10; background: transparent;
            transition: background 0.15s;
        }
        #pivotOutput .pvt-resizer:hover,
        #pivotOutput .pvt-resizer.dragging { background: #3b82f6; }
        body.light #pivotOutput .pvt-resizer:hover,
        body.light #pivotOutput .pvt-resizer.dragging { background: #2563eb; }

        /* Custom top bar above the pivot UI: relocates the renderer (Table)
           selector to the left and shows the record count on the right,
           keeping them on a single row above the pvtUi grid. */
        #pivotView .pivot-top-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 0 0 12px 0; flex-wrap: wrap;
        }
        #pivotView .pivot-top-left { flex: 0 0 auto; }
        #pivotView .pivot-top-right {
            flex: 1 1 auto; text-align: right;
            color: #94a3b8; font-size: 13px;
        }
        body.light #pivotView .pivot-top-right { color: #64748b; }
        /* The original renderer cell is left visually empty once we move its
           contents to the top bar — keep it from re-acquiring height. */
        #pivotView table.pvtUi > tbody > tr:first-child > td:first-child:empty {
            padding: 0; border: 0; height: 0;
        }

        /* Collapse toggle on the Unused column */
        #pivotOutput .pvt-collapse-btn {
            position: absolute; top: 4px; right: 6px;
            width: 22px; height: 22px; padding: 0;
            background: transparent; border: none; color: #94a3b8;
            cursor: pointer; z-index: 11;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; line-height: 1; font-family: inherit;
        }
        #pivotOutput .pvt-collapse-btn:hover { color: #e2e8f0; }
        body.light #pivotOutput .pvt-collapse-btn { color: #64748b; }
        body.light #pivotOutput .pvt-collapse-btn:hover { color: #1e293b; }

        #pivotOutput td.pvtUnused.pvt-unused-collapsed {
            padding: 4px; overflow: hidden;
        }
        #pivotOutput td.pvtUnused.pvt-unused-collapsed > li { display: none; }
        #pivotOutput td.pvtUnused.pvt-unused-collapsed .pvt-resizer { display: none; }
        #pivotOutput td.pvtUnused.pvt-unused-collapsed .pvt-collapse-btn {
            top: 50%; right: 50%; transform: translate(50%, -50%);
        }

        /* Floating sticky horizontal scrollbar for pivot */
        #pivotHScroll {
            position: fixed;
            height: 14px;
            overflow-x: scroll;
            overflow-y: hidden;
            background: #0f172a;
            z-index: 100;
            display: none;
        }
        #pivotHScroll > div { height: 1px; }
        body.light #pivotHScroll { background: #f1f5f9; }
        /* Hide the native scrollbar of #pivotView (floating one above replaces it) */
        #pivotView { scrollbar-width: none; }
        #pivotView::-webkit-scrollbar { display: none; }

        /* Theme & Font controls */
        .toolbar-controls {
            display: flex; align-items: center; gap: 6px; margin-left: auto;
        }
        .toolbar-controls button {
            background: none; border: 1px solid #475569; color: #94a3b8;
            border-radius: 6px; width: 32px; height: 32px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.15s;
        }
        .toolbar-controls button:hover { background: #334155; color: #e2e8f0; }
        .toolbar-controls .font-label {
            font-size: 11px; color: #64748b; font-weight: 600; margin: 0 2px;
        }
        /* Username chip + Logout button. Chip is non-interactive; the
           inline form wrapping Logout is sized to its child so it doesn't
           steal flex space from the toolbar. */
        .toolbar-controls .user-chip {
            display: inline-flex; align-items: center; gap: 6px;
            margin-left: 6px; padding: 4px 10px;
            font-size: 12px; color: #cbd5e1;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 999px; white-space: nowrap;
        }
        body.light .toolbar-controls .user-chip {
            background: #f8fafc; border-color: #e2e8f0; color: #334155;
        }
        /* Fast-mode users (FAST_MODE_USERS in app.py) get a lightning-
           bolt icon instead of the person silhouette. Tint it amber so
           the chip reads as "fast" at a glance — text stays the chip's
           normal color so the username remains the visual anchor. */
        .toolbar-controls .user-chip.fast-user svg {
            color: #fbbf24;
        }
        .toolbar-controls #logoutBtn {
            width: auto; padding: 0 12px; font-size: 12px;
        }

        /* Light theme */
        body.light { background: #f1f5f9; color: #1e293b; }
        body.light .sidebar { background: #fff; border-right-color: #e2e8f0; }
        body.light .sidebar-header { border-bottom-color: #e2e8f0; }
        body.light .sidebar-header h3 { color: #64748b; }
        body.light .sidebar-close { color: #94a3b8; }
        body.light .sidebar-close:hover { color: #1e293b; }
        body.light .sidebar-actions button { border-color: #cbd5e1; color: #64748b; }
        body.light .sidebar-actions button:hover { background: #f1f5f9; color: #1e293b; }
        body.light .sidebar-actions { border-bottom-color: #e2e8f0; }
        body.light .col-list label { color: #334155; }
        body.light .col-list label:hover { background: #f1f5f9; }
        body.light .toolbar { background: #fff; border-bottom-color: #e2e8f0; }
        body.light .toolbar h1 { color: #0f172a; }
        body.light .toolbar input[type=date] { background: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
        body.light .toolbar input[type=date]::-webkit-calendar-picker-indicator { filter: none; }
        body.light .toolbar-label { color: #94a3b8; }
        body.light .toolbar-controls button { border-color: #cbd5e1; color: #64748b; }
        body.light .toolbar-controls button:hover { background: #f1f5f9; color: #1e293b; }
        body.light .pill-group label { background: #f8fafc; border-color: #cbd5e1; color: #64748b; }
        body.light .pill-group input:checked + label { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        body.light .content { background: #f1f5f9; }
        body.light #status { color: #64748b; }
        body.light table { background: #fff; }
        body.light thead th { background: #f1f5f9; color: #64748b; border-bottom-color: #e2e8f0; }
        body.light td { color: #334155; border-bottom-color: #f1f5f9; }
        body.light tbody tr { background: #fff; }
        body.light tbody tr:nth-child(even) { background: #f8fafc; }
        body.light tbody tr:hover { background: #eff6ff; }
        body.light .filter-dropdown { background: #fff; border-color: #e2e8f0; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        body.light .filter-dropdown .fd-search { border-bottom-color: #e2e8f0; }
        body.light .filter-dropdown .fd-search input { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light .filter-dropdown .fd-row { color: #334155; }
        body.light .filter-dropdown .fd-row:hover { background: #f1f5f9; }
        body.light .filter-dropdown .fd-selall { border-bottom-color: #e2e8f0; }
        body.light .filter-dropdown .fd-actions { border-top-color: #e2e8f0; }
        body.light .filter-dropdown .fd-cancel { color: #64748b; border-color: #cbd5e1; }
        body.light .filter-dropdown .fd-cancel:hover { background: #f1f5f9; color: #1e293b; }
        body.light .progress-bar-wrap { background: #e2e8f0; }
        body.light .progress-text { color: #64748b; }
        body.light #pivotOutput .pvtUi { color: #1e293b; }
        body.light #pivotOutput .pvtAxisContainer,
        body.light #pivotOutput .pvtVals { background: #fff; border-color: #e2e8f0; }
        body.light #pivotOutput .pvtAxisContainer li span.pvtAttr { background: #f1f5f9; border-color: #cbd5e1; color: #334155; }
        body.light #pivotOutput .pvtAxisContainer li span.pvtAttr:hover { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        body.light #pivotOutput select,
        body.light #pivotOutput .pvtSearch input { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light #pivotOutput table.pvtTable { background: #fff; }
        body.light #pivotOutput table.pvtTable thead th { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        body.light #pivotOutput table.pvtTable tbody td { background: #fff; color: #334155; border-color: #f1f5f9; }
        body.light #pivotOutput table.pvtTable tbody td.pvtTotal,
        body.light #pivotOutput table.pvtTable tbody th.pvtTotalLabel,
        body.light #pivotOutput table.pvtTable thead th.pvtTotalLabel { background: #f8fafc; color: #0f172a; }
        body.light #pivotOutput .pvtFilterBox { background: #fff; border-color: #e2e8f0; color: #1e293b; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        body.light #pivotOutput .pvtFilterBox input[type=text] { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light #pivotOutput .pvtCheckContainer label { color: #334155; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            }
            .sidebar.collapsed { margin-left: 0; transform: translateX(-260px); }
            .toolbar { padding: 12px 16px; gap: 10px; }
            .toolbar h1 { font-size: 16px; width: 100%; margin-right: 0; }
            .toolbar-group { flex: 1; min-width: 0; }
            .toolbar input[type=date] { width: 100%; min-width: 0; }
            .pill-group label { padding: 7px 10px; font-size: 12px; }
            .btn-fetch { flex: 1; }
            .content { padding: 12px 16px; }
            table { display: block; overflow-x: auto; }
        }

        /* ---- Print styles -------------------------------------------------
           Targets the table view + pivot view. Sheet view (Univer) is hidden
           because its canvas-based rendering doesn't print cleanly — users
           who want to print the spreadsheet should Save as XLSX and print
           from Excel.
           Approach: hide all chrome (sidebar, toolbar, view tabs, sheet
           toolbar, progress, interactive filter icons), force light theme
           so dark-mode users get readable output, and set up the table to
           repeat its header on every page and avoid splitting rows. */
        @media print {
            /* Hide app chrome */
            .sidebar,
            .main > .toolbar,
            #progressContainer,
            #spreadsheetView,
            .filter-dropdown {
                display: none !important;
            }
            /* Force light palette even if user is on dark theme. The light
               class is what swaps the page to white; we add it unconditionally
               here and reset background/foreground so prints aren't washed
               out or inverted. */
            body, body.light {
                background: #fff !important;
                color: #000 !important;
            }
            .main {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
            .content {
                padding: 0 !important;
                margin: 0 !important;
            }
            /* "Showing X of Y records" — small header line on the print */
            #status {
                font-size: 10pt;
                color: #000 !important;
                margin: 0 0 6pt 0;
                padding: 0;
            }
            /* Table view */
            #reportTable {
                display: table !important;
                width: 100% !important;
                font-size: 8.5pt !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
            }
            #reportTable thead {
                display: table-header-group; /* repeat header on each page */
            }
            #reportTable tbody tr {
                page-break-inside: avoid;
                background: #fff !important;
            }
            #reportTable th,
            #reportTable td {
                border: 1px solid #888 !important;
                padding: 3pt 5pt !important;
                background: #fff !important;
                color: #000 !important;
                vertical-align: top;
                /* Wrap long cells onto multiple lines instead of letting them
                   overflow the page width. Particularly important for Thai
                   names that can be 30+ characters. */
                word-wrap: break-word;
                overflow-wrap: break-word;
                white-space: normal !important;
            }
            #reportTable th {
                font-weight: 700;
                background: #f3f4f6 !important;
            }
            /* Filter / sort icons are interactive-only — strip them out so
               header cells aren't cluttered. */
            #reportTable .filter-icon,
            #reportTable .sort-icon,
            #reportTable th button {
                display: none !important;
            }
            /* Pivot view — PivotTable.js renders a configurator (drag-drop
               field selectors + aggregator dropdown + chart-type tabs)
               around the result table. We hide the configurator chrome and
               keep just the rendered .pvtTable inside .pvtRendererArea.
               pvtUi DOM shape (no <tbody> — PivotTable.js builds TRs as
               direct children of <table>):
                 <table.pvtUi>
                   <tr> [td.pvtUiCell empty] [td.pvtVals.pvtUiCell aggregator] [td.pvtAxisContainer.pvtCols.pvtUiCell col-fields]
                   <tr> [td.pvtAxisContainer.pvtUnused.pvtUiCell unused] [td.pvtAxisContainer.pvtRows.pvtUiCell row-fields] [td.pvtRendererArea result]
               Hide everything with `pvtUiCell` (configurator), keep the
               `pvtRendererArea` cell. */
            #pivotView,
            #pivotView .pvtUi,
            #pivotView td.pvtRendererArea {
                overflow: visible !important;
                background: #fff !important;
                width: 100% !important;
            }
            #pivotView .pivot-top-bar,
            #pivotView .pvtUi td.pvtUiCell {
                display: none !important;
            }
            #pivotView .pvtTable {
                width: 100% !important;
                font-size: 8.5pt !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
            }
            /* Thai header text was rendering one character per line because
               the column was collapsing too narrow. Keep wrap allowed for
               long row labels (data cells), but force headers onto a single
               line with auto width so column headers stay readable. */
            #pivotView .pvtTable th {
                white-space: nowrap !important;
                font-weight: 700;
                background: #f3f4f6 !important;
            }
            #pivotView .pvtTable th,
            #pivotView .pvtTable td {
                border: 1px solid #888 !important;
                padding: 3pt 5pt !important;
                background: #fff !important;
                color: #000 !important;
            }
            #pivotView .pvtTable th { background: #f3f4f6 !important; }
            /* Page setup: A4 landscape gives the widest cell area for our
               5-column-default report. Users who need portrait can override
               in the browser print dialog. */
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Columns</h3>
            <button class="sidebar-close" id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-actions">
            <button type="button" id="checkAll">Select All</button>
            <button type="button" id="uncheckAll">Deselect All</button>
        </div>
        <ul class="col-list" id="colList"></ul>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="toolbar">
            <button class="toolbar-toggle" id="toggleSidebar" title="Toggle columns">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </button>
            <h1>SE Report</h1>
            <form id="reportForm" style="display:contents;">
                <div class="toolbar-group">
                    <span class="toolbar-label">From</span>
                    <input type="date" id="date_from" name="date_from" required>
                </div>
                <div class="toolbar-group">
                    <span class="toolbar-label">To</span>
                    <input type="date" id="date_to" name="date_to" required>
                </div>
                <div class="pill-group" style="display:none;">
                    <input type="radio" name="report_type" value="enquiry" id="rt_enquiry" checked>
                    <label for="rt_enquiry">Enquiry</label>
                    <input type="radio" name="report_type" value="closeClaim" id="rt_close">
                    <label for="rt_close">Close Claim</label>
                </div>
                <button type="submit" class="btn-fetch" id="submitBtn">ดึงข้อมูล</button>
            </form>
            <div class="pill-group" id="viewToggle" style="margin-left:8px;">
                <input type="radio" name="view" value="table" id="v_table" checked>
                <label for="v_table">ข้อมูล</label>
                <input type="radio" name="view" value="pivot" id="v_pivot">
                <label for="v_pivot">Pivot</label>
                <input type="radio" name="view" value="spreadsheet" id="v_spreadsheet">
                <label for="v_spreadsheet" style="border-left:none;">Sheet</label>
            </div>
            <div class="toolbar-controls">
                <button id="exportBtn" class="toolbar-export" title="Export Excel (.xlsx)" aria-label="Export Excel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button id="fontDown" title="ลดขนาดตัวอักษร">A-</button>
                <span class="font-label" id="fontSizeLabel">13</span>
                <button id="fontUp" title="เพิ่มขนาดตัวอักษร">A+</button>
                <button id="themeToggle" title="สลับธีม">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                {% if username %}
                <span class="user-chip{% if is_fast_user %} fast-user{% endif %}"
                      title="{% if is_fast_user %}ผู้ใช้ Fast mode{% else %}ผู้ใช้ปัจจุบัน{% endif %}">
                    {% if is_fast_user %}
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>
                    </svg>
                    {% else %}
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    {% endif %}
                    {{ username }}
                </span>
                <form method="POST" action="/logout" style="display:inline;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" id="logoutBtn" title="ออกจากระบบ">Logout</button>
                </form>
                {% endif %}
            </div>
        </div>

        <div class="content">
            <div id="status"></div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">Connecting...</span>
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
            </div>

            <div id="tableView">
                <table id="reportTable" style="display:none;">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="pivotView" style="display:none;">
                <div id="pivotOutput"></div>
            </div>

            <div id="spreadsheetView">
                <div id="univerHost">
                    <div id="sheetLoadingOverlay">
                        <div class="sheet-spinner"></div>
                        <div class="sheet-loading-text">กำลังโหลด Univer...</div>
                    </div>
                    <div id="sheetEmptyMessage"><div class="sheet-empty-text">ยังไม่มีข้อมูล — กรุณา Fetch ก่อน แล้วกลับมาที่นี่<br>หรือกดปุ่ม <b>Open</b> เพื่อโหลด workbook ที่บันทึกไว้</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const COLUMN_MAP = {{ column_map | tojson }};
        const FILTER_SVG = `<svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`;

        const form = document.getElementById('reportForm');
        const status = document.getElementById('status');
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        const table = document.getElementById('reportTable');
        const btn = document.getElementById('submitBtn');
        const sidebar = document.getElementById('sidebar');
        const colList = document.getElementById('colList');

        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('date_from').value = today;
        document.getElementById('date_to').value = today;

        // ========== THEME TOGGLE ==========
        const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>';
        const SUN_SVG = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeIcon.innerHTML = theme === 'light' ? MOON_SVG : SUN_SVG;
            localStorage.setItem('se_theme', theme);
        }
        applyTheme(localStorage.getItem('se_theme') || 'light');

        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });

        // ========== FONT SIZE ==========
        const fontSizeLabel = document.getElementById('fontSizeLabel');
        let fontSize = parseInt(localStorage.getItem('se_font_size') || '13');

        function applyFontSize(size) {
            fontSize = Math.max(10, Math.min(20, size));
            document.documentElement.style.setProperty('--base-font', fontSize + 'px');
            document.querySelectorAll('td, thead th').forEach(el => el.style.fontSize = fontSize + 'px');
            document.querySelectorAll('.col-list label').forEach(el => el.style.fontSize = fontSize + 'px');
            document.querySelectorAll('#pivotOutput td, #pivotOutput th, #pivotOutput .pvtAttr, #pivotOutput select, #pivotOutput .pvtFilterBox label').forEach(el => el.style.fontSize = fontSize + 'px');
            fontSizeLabel.textContent = fontSize;
            localStorage.setItem('se_font_size', fontSize);
            // The pivot's column widths are floored at the intrinsic content
            // width of the Unused / Aggregator cells, measured once and cached
            // on the table as _minCol1 / _minCol2. Larger font sizes grow the
            // cell contents but the cached minimum doesn't follow, so col 2
            // stops expanding once font size exceeds the original measurement
            // and the Cols-area pill ("ผู้ตรวจสอบงาน" etc.) overflows. Invalidate
            // the cache and reapply on every font change. requestAnimationFrame
            // gives the browser one frame to relayout at the new font size
            // before we re-measure.
            if (typeof attachPivotResizers === 'function') {
                requestAnimationFrame(() => {
                    const tbl = document.querySelector('#pivotOutput table.pvtUi');
                    if (!tbl) return;
                    delete tbl._minCol1;
                    delete tbl._minCol2;
                    attachPivotResizers();
                    if (typeof updatePivotHScroll === 'function') updatePivotHScroll();
                });
            }
        }
        applyFontSize(fontSize);

        document.getElementById('fontUp').addEventListener('click', () => applyFontSize(fontSize + 1));
        document.getElementById('fontDown').addEventListener('click', () => applyFontSize(fontSize - 1));

        // Sidebar
        document.getElementById('toggleSidebar').addEventListener('click', () => sidebar.classList.toggle('collapsed'));
        document.getElementById('closeSidebar').addEventListener('click', () => sidebar.classList.add('collapsed'));
        document.getElementById('checkAll').addEventListener('click', () => {
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });
        document.getElementById('uncheckAll').addEventListener('click', () => {
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });

        function getColumnPrefs(reportType) {
            try {
                const saved = localStorage.getItem('se_col_prefs_' + reportType);
                return saved ? JSON.parse(saved) : null;
            } catch { return null; }
        }

        function saveColumnPrefs() {
            const rt = document.querySelector('input[name=report_type]:checked').value;
            const prefs = {};
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => {
                prefs[cb.value] = cb.checked;
            });
            localStorage.setItem('se_col_prefs_' + rt, JSON.stringify(prefs));
        }

        function buildColumnCheckboxes(reportType) {
            const cols = COLUMN_MAP[reportType] || [];
            const prefs = getColumnPrefs(reportType);
            colList.innerHTML = '';
            cols.forEach(([key, label]) => {
                const li = document.createElement('li');
                const lbl = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.value = key; cb.dataset.label = label;
                cb.checked = prefs ? (prefs[key] !== false) : true;
                lbl.appendChild(cb);
                lbl.appendChild(document.createTextNode(label));
                li.appendChild(lbl);
                colList.appendChild(li);
            });
        }

        function getSelectedColumns() {
            const selected = [];
            colList.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
                selected.push({ key: cb.value, label: cb.dataset.label });
            });
            return selected;
        }

        buildColumnCheckboxes('enquiry');
        if (window.matchMedia('(max-width: 768px)').matches) sidebar.classList.add('collapsed');

        document.querySelectorAll('input[name=report_type]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                buildColumnCheckboxes(e.target.value);
                thead.innerHTML = ''; tbody.innerHTML = '';
                table.style.display = 'none'; status.textContent = '';
                lastRecords = null; columnFilters = {};
                invalidateAllDataCaches();
            });
        });

        // --- Column filter state: { key: Set of allowed values } ---
        let lastRecords = null;
        let columnFilters = {};
        let openDropdown = null;

        // --- Derived-data caches ---
        // Each cache holds the result of one expensive recompute so that
        // switching tabs / opening filter dropdowns / triggering an export
        // does not redo work that hasn't actually changed.
        //   _filteredCache  applyColumnFilters output. Invalidated when
        //                   lastRecords OR columnFilters changes.
        //   _uniqueCache    map of colKey -> sorted unique values used by
        //                   the filter dropdown. Invalidated when
        //                   lastRecords changes.
        //   _pivotCache     { rt, data } memo of the label-keyed row array
        //                   passed to pivotUI. Invalidated when lastRecords
        //                   changes; the rt guard handles report-type
        //                   switches when both reports coexist in memory.
        let _filteredCache = null;
        const _uniqueCache = new Map();
        let _pivotCache = null;

        function invalidateAllDataCaches() {
            _filteredCache = null;
            _uniqueCache.clear();
            _pivotCache = null;
        }
        function invalidateFilterCache() {
            _filteredCache = null;
        }
        function getFilteredRecords() {
            if (_filteredCache !== null) return _filteredCache;
            _filteredCache = lastRecords ? applyColumnFilters(lastRecords) : [];
            return _filteredCache;
        }

        let openDropdownTh = null;

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (openDropdown && !openDropdown.contains(e.target) && !e.target.closest('th')) {
                closeDropdown();
            }
        });

        function getUniqueValues(key) {
            if (!lastRecords) return [];
            const cached = _uniqueCache.get(key);
            if (cached) return cached;
            const vals = new Set();
            let hasBlank = false;
            lastRecords.forEach(r => {
                const v = r[key];
                if (v === null || v === undefined || String(v).trim() === '') hasBlank = true;
                else vals.add(String(v));
            });
            const sorted = [...vals].sort((a, b) => a.localeCompare(b, 'th'));
            if (hasBlank) sorted.push('');
            _uniqueCache.set(key, sorted);
            return sorted;
        }

        function openFilterDropdown(th, colKey) {
            // close any open
            closeDropdown();

            const rect = th.getBoundingClientRect();
            const dd = document.createElement('div');
            dd.className = 'filter-dropdown';
            // position near the column header
            let left = rect.left;
            if (left + 240 > window.innerWidth) left = window.innerWidth - 250;
            dd.style.top = rect.bottom + 4 + 'px';
            dd.style.left = left + 'px';
            dd.addEventListener('click', e => e.stopPropagation());

            const uniqueVals = getUniqueValues(colKey);
            const currentFilter = columnFilters[colKey];

            // Source of truth for the dropdown's checked state. Decoupled
            // from the DOM so the virtual scroller can recycle off-screen
            // rows without losing selections. Initialized to the existing
            // filter (if any), else "all checked".
            const checkedSet = currentFilter
                ? new Set(currentFilter)
                : new Set(uniqueVals);

            // The search-filtered subset of uniqueVals that the virtual
            // scroller renders a window into. Replaced wholesale on each
            // keystroke in the search box.
            let displayVals = uniqueVals;

            // search
            const searchDiv = document.createElement('div');
            searchDiv.className = 'fd-search';
            const searchInput = document.createElement('input');
            searchInput.type = 'text'; searchInput.placeholder = 'Search...';
            searchDiv.appendChild(searchInput);
            dd.appendChild(searchDiv);

            // Select All — pinned above the scroll container, not inside
            // the virtualized list, so it stays visible no matter how far
            // the user scrolls and isn't recycled by renderVisible.
            const selAllDiv = document.createElement('div');
            selAllDiv.className = 'fd-selall';
            const selAllRow = document.createElement('label');
            selAllRow.className = 'fd-row';
            const selAllCb = document.createElement('input');
            selAllCb.type = 'checkbox';
            selAllRow.appendChild(selAllCb);
            selAllRow.appendChild(document.createTextNode('(Select All)'));
            selAllDiv.appendChild(selAllRow);
            dd.appendChild(selAllDiv);

            // Virtual scroll list. Row height MUST match the CSS height
            // on .fd-row (26px) or the math drifts and rows overlap or
            // gap. View height matches max-height on .fd-list.
            const ROW_H = 26;
            const VIEW_H = 200;
            const BUFFER = 4;

            const list = document.createElement('div');
            list.className = 'fd-list';
            const sizer = document.createElement('div');
            sizer.style.position = 'relative';
            list.appendChild(sizer);
            const pool = document.createElement('div');
            pool.style.position = 'absolute';
            pool.style.left = '0';
            pool.style.right = '0';
            pool.style.top = '0';
            sizer.appendChild(pool);
            dd.appendChild(list);

            function updateSelAllState() {
                if (displayVals.length === 0) {
                    selAllCb.checked = false;
                    selAllCb.indeterminate = false;
                    return;
                }
                let on = 0;
                for (const v of displayVals) if (checkedSet.has(v)) on++;
                selAllCb.checked = on === displayVals.length;
                selAllCb.indeterminate = on > 0 && on < displayVals.length;
            }

            function renderVisible() {
                const n = displayVals.length;
                sizer.style.height = (n * ROW_H) + 'px';
                const top = list.scrollTop;
                const start = Math.max(0, Math.floor(top / ROW_H) - BUFFER);
                const visCount = Math.ceil(VIEW_H / ROW_H) + 2 * BUFFER;
                const end = Math.min(n, start + visCount);
                pool.style.transform = `translateY(${start * ROW_H}px)`;
                const frag = document.createDocumentFragment();
                for (let i = start; i < end; i++) {
                    const val = displayVals[i];
                    const row = document.createElement('label');
                    row.className = 'fd-row';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = checkedSet.has(val);
                    cb.addEventListener('change', () => {
                        if (cb.checked) checkedSet.add(val);
                        else checkedSet.delete(val);
                        updateSelAllState();
                    });
                    row.appendChild(cb);
                    row.appendChild(document.createTextNode(val === '' ? '(Blanks)' : val));
                    frag.appendChild(row);
                }
                pool.replaceChildren(frag);
            }

            // Coalesce scroll-driven renders to one per frame.
            let scrollRAF = 0;
            list.addEventListener('scroll', () => {
                if (scrollRAF) return;
                scrollRAF = requestAnimationFrame(() => {
                    scrollRAF = 0;
                    renderVisible();
                });
            });

            searchInput.addEventListener('input', () => {
                const q = searchInput.value.toLowerCase();
                displayVals = q
                    ? uniqueVals.filter(v => v.toLowerCase().includes(q))
                    : uniqueVals;
                list.scrollTop = 0;
                renderVisible();
                updateSelAllState();
            });

            selAllCb.addEventListener('change', () => {
                // Toggle every currently-visible (search-filtered) value.
                if (selAllCb.checked) displayVals.forEach(v => checkedSet.add(v));
                else displayVals.forEach(v => checkedSet.delete(v));
                renderVisible();
            });

            // actions
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'fd-actions';

            const okBtn = document.createElement('button');
            okBtn.textContent = 'OK'; okBtn.className = 'fd-ok';
            okBtn.addEventListener('click', () => {
                if (checkedSet.size === uniqueVals.length) {
                    delete columnFilters[colKey];
                    th.classList.remove('filtered');
                } else {
                    columnFilters[colKey] = checkedSet;
                    th.classList.add('filtered');
                }
                invalidateFilterCache();
                closeDropdown();
                renderRows();
            });

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel'; cancelBtn.className = 'fd-cancel';
            cancelBtn.addEventListener('click', () => closeDropdown());

            actionsDiv.appendChild(okBtn);
            actionsDiv.appendChild(cancelBtn);
            dd.appendChild(actionsDiv);

            document.body.appendChild(dd);
            openDropdown = dd;
            openDropdownTh = th;

            renderVisible();
            updateSelAllState();
            searchInput.focus();
        }

        function closeDropdown() {
            if (openDropdown) { openDropdown.remove(); openDropdown = null; openDropdownTh = null; }
        }

        function applyColumnFilters(records) {
            const keys = Object.keys(columnFilters);
            if (keys.length === 0) return records;
            return records.filter(record =>
                keys.every(key => {
                    const allowed = columnFilters[key];
                    const val = record[key];
                    const str = (val === null || val === undefined || String(val).trim() === '') ? '' : String(val);
                    return allowed.has(str);
                })
            );
        }

        let currentSelected = [];

        function renderTable() {
            if (!lastRecords || lastRecords.length === 0) return;
            currentSelected = getSelectedColumns();
            if (currentSelected.length === 0) {
                thead.innerHTML = ''; tbody.innerHTML = '';
                table.style.display = 'none';
                status.textContent = `Total: ${lastRecords.length} records (no columns selected)`;
                return;
            }

            thead.innerHTML = '';
            tbody.innerHTML = '';

            const headerRow = document.createElement('tr');
            currentSelected.forEach(col => {
                const th = document.createElement('th');
                const content = document.createElement('div');
                content.className = 'th-content';
                content.innerHTML = `<span>${col.label}</span>${FILTER_SVG}`;
                th.appendChild(content);
                th.style.fontSize = fontSize + 'px';
                th.dataset.key = col.key;
                if (columnFilters[col.key]) th.classList.add('filtered');
                th.addEventListener('click', (e) => {
                    if (e.target.closest('.filter-dropdown')) return;
                    openFilterDropdown(th, col.key);
                });
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);

            renderRows();
            table.style.display = 'table';
        }

        // ========== VIRTUAL SCROLL ==========
        // Renders only rows inside the viewport (+ buffer) so that datasets
        // with 100k+ rows don't blow up the DOM. Top/bottom spacer <tr>s are
        // persistent anchors so tbody's scrollHeight never collapses during
        // re-render (which would clamp scrollTop to 0). Filter/pivot/
        // export still operate on `lastRecords` directly.
        let _virtualFiltered = [];
        let _virtualRange = { start: -1, end: -1 };
        let _rowHeight = 34;
        let _rowHeightMeasured = false;
        let _topSpacer = null;
        let _bottomSpacer = null;
        const VIRTUAL_BUFFER = 20;
        const scrollContainer = document.querySelector('.content');

        function renderRows() {
            _virtualFiltered = getFilteredRecords();
            _virtualRange = { start: -1, end: -1 };
            _renderVisibleRows();
            status.textContent = `Showing ${_virtualFiltered.length} of ${lastRecords.length} records`;
        }

        function _computeVisibleRange() {
            const total = _virtualFiltered.length;
            if (total === 0) return { start: 0, end: 0 };
            const tableRect = table.getBoundingClientRect();
            const containerRect = scrollContainer.getBoundingClientRect();
            const headerH = thead.getBoundingClientRect().height || 40;
            const offsetPastTable = Math.max(0, containerRect.top - tableRect.top);
            const effectiveTop = Math.max(0, offsetPastTable - headerH);
            const viewH = scrollContainer.clientHeight;
            const start = Math.max(0, Math.floor(effectiveTop / _rowHeight) - VIRTUAL_BUFFER);
            const visible = Math.ceil(viewH / _rowHeight) + 2 * VIRTUAL_BUFFER;
            const end = Math.min(total, start + visible);
            return { start, end };
        }

        function _ensureSpacers(colspan) {
            if (_topSpacer && _topSpacer.parentNode === tbody &&
                _bottomSpacer && _bottomSpacer.parentNode === tbody) {
                _topSpacer.firstChild.colSpan = colspan;
                _bottomSpacer.firstChild.colSpan = colspan;
                return;
            }
            _topSpacer = document.createElement('tr');
            _topSpacer.className = 'virtual-spacer';
            _topSpacer.innerHTML = `<td colspan="${colspan}" style="height:0"></td>`;
            _bottomSpacer = document.createElement('tr');
            _bottomSpacer.className = 'virtual-spacer';
            _bottomSpacer.innerHTML = `<td colspan="${colspan}" style="height:0"></td>`;
            tbody.replaceChildren(_topSpacer, _bottomSpacer);
        }

        function _renderVisibleRows() {
            const total = _virtualFiltered.length;
            if (total === 0) {
                tbody.replaceChildren();
                _topSpacer = _bottomSpacer = null;
                return;
            }
            const selected = currentSelected.length ? currentSelected : getSelectedColumns();
            const { start, end } = _computeVisibleRange();
            _virtualRange = { start, end };
            const colspan = selected.length;

            _ensureSpacers(colspan);

            // Remove existing visible rows between spacers, then insert fresh
            // ones. Spacers stay in place so tbody never collapses in height.
            let node = _topSpacer.nextSibling;
            while (node && node !== _bottomSpacer) {
                const toRemove = node;
                node = node.nextSibling;
                toRemove.remove();
            }

            _topSpacer.firstChild.style.height = (start * _rowHeight) + 'px';
            _bottomSpacer.firstChild.style.height = ((total - end) * _rowHeight) + 'px';

            const frag = document.createDocumentFragment();
            for (let i = start; i < end; i++) {
                const record = _virtualFiltered[i];
                const tr = document.createElement('tr');
                selected.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = record[col.key] ?? '';
                    td.style.fontSize = fontSize + 'px';
                    tr.appendChild(td);
                });
                frag.appendChild(tr);
            }
            tbody.insertBefore(frag, _bottomSpacer);

            if (!_rowHeightMeasured) {
                const realRow = tbody.querySelector('tr:not(.virtual-spacer)');
                if (realRow) {
                    const h = realRow.getBoundingClientRect().height;
                    _rowHeightMeasured = true;
                    if (h > 10 && Math.abs(h - _rowHeight) > 1) {
                        _rowHeight = h;
                        _renderVisibleRows();
                    }
                }
            }
        }

        let _scrollRaf = null;
        scrollContainer.addEventListener('scroll', () => {
            if (_scrollRaf) return;
            _scrollRaf = requestAnimationFrame(() => {
                _scrollRaf = null;
                if (tableView.style.display === 'none') return;
                if (!lastRecords || lastRecords.length === 0) return;
                const r = _computeVisibleRange();
                if (r.start !== _virtualRange.start || r.end !== _virtualRange.end) {
                    _renderVisibleRows();
                }
            });
        });

        window.addEventListener('resize', () => {
            if (!lastRecords || lastRecords.length === 0) return;
            if (tableView && tableView.style.display !== 'none') _renderVisibleRows();
        });

        colList.addEventListener('change', () => {
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });

        // ========== VIEW TOGGLE ==========
        const tableView = document.getElementById('tableView');
        const pivotView = document.getElementById('pivotView');

        function switchView(view) {
            tableView.style.display = view === 'table' ? 'block' : 'none';
            pivotView.style.display = view === 'pivot' ? 'block' : 'none';
            const spreadsheetView = document.getElementById('spreadsheetView');
            if (spreadsheetView) spreadsheetView.style.display = view === 'spreadsheet' ? 'flex' : 'none';
            // The Pivot top bar mirrors the record count, so hide the global
            // status text there to avoid two copies. Spreadsheet has its own
            // toolbar status, also hide.
            document.getElementById('status').style.display =
                (view === 'pivot' || view === 'spreadsheet') ? 'none' : '';
            // Auto-collapse the Columns sidebar on Pivot/Spreadsheet (those
            // views manage their own column model) and restore it elsewhere.
            // Skip on mobile where the sidebar is overlay-managed manually.
            if (!window.matchMedia('(max-width: 768px)').matches) {
