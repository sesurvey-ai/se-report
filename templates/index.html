                             !child.textContent.trim()) ||
                            child.tagName === 'BR') {
                            child.remove();
                        }
                    });
                }
                regroup([selectAll, selectNone], 'pvt-filter-actions', false);
                regroup([cancelBtn, applyBtn], 'pvt-filter-footer', true);

                // Close button at top-right — sibling of h4 so its click
                // doesn't bubble into the drag handler.
                if (!fb.querySelector(':scope > .pvt-filter-close')) {
                    const closeBtn = document.createElement('button');
                    closeBtn.type = 'button';
                    closeBtn.className = 'pvt-filter-close';
                    closeBtn.textContent = '×';
                    closeBtn.title = 'ปิด';
                    fb.appendChild(closeBtn);
                    closeBtn.addEventListener('click', ev => {
                        ev.stopPropagation();
                        fb.style.display = 'none';
                    });
                }

                header.addEventListener('mousedown', e => {
                    const parent = fb.offsetParent || document.body;
                    const parentRect = parent.getBoundingClientRect();
                    const rect = fb.getBoundingClientRect();
                    const offX = e.clientX - rect.left;
                    const offY = e.clientY - rect.top;
                    const onMove = ev => {
                        fb.style.left = (ev.clientX - offX - parentRect.left) + 'px';
                        fb.style.top  = (ev.clientY - offY - parentRect.top)  + 'px';
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        document.body.style.userSelect = '';
                    };
                    document.body.style.userSelect = 'none';
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    e.preventDefault();
                });
            });
        }

        // Drag-to-resize for pivot UI columns (unused | rows | renderer).
        // PivotTable.js renders a <table.pvtUi> without colgroup, so widths
        // don't propagate across rows. We inject a colgroup and let CSS
        // table-layout:fixed honor the col widths. Saved in localStorage.
        function attachPivotResizers() {
            const tbl = document.querySelector('#pivotOutput table.pvtUi');
            if (!tbl) return;

            // Measure intrinsic CONTENT width of the row-1 cells (renderer
            // selector for col 1, aggregator for col 2). We sum the cell's
            // children rather than using getBoundingClientRect on the cell
            // itself, because the cell width reflects auto-layout's share of
            // the table — not the actual width of "Table" / "Count + arrows".
            function intrinsicWidth(cell) {
                if (!cell) return 0;
                let w = 0;
                for (const c of cell.children) w += c.getBoundingClientRect().width;
                const cs = getComputedStyle(cell);
                w += parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
                return Math.ceil(w) + 10; // small buffer for the resizer
            }
            if (typeof tbl._minCol1 === 'undefined') {
                tbl._minCol1 = intrinsicWidth(tbl.querySelector('tr:first-child td:first-child')) || 140;
            }
            if (typeof tbl._minCol2 === 'undefined') {
                tbl._minCol2 = intrinsicWidth(tbl.querySelector('td.pvtVals')) || 200;
            }

            // Ensure colgroup with 3 cols exists (pivot has 3 columns in row 2)
            let colgroup = tbl.querySelector(':scope > colgroup');
            if (!colgroup) {
                colgroup = document.createElement('colgroup');
                for (let i = 0; i < 3; i++) colgroup.appendChild(document.createElement('col'));
                tbl.insertBefore(colgroup, tbl.firstChild);
            }
            const colEls = colgroup.querySelectorAll('col');

            // Restore saved widths (col 3 = renderer area, stays auto).
            // Clamp to measured minimums in case localStorage holds an older
            // narrower value from before this floor was introduced.
            const saved = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
            const savedCol1 = parseInt(saved.col1, 10) || 260;
            const savedCol2 = parseInt(saved.col2, 10) || 200;
            const unusedCell = tbl.querySelector('td.pvtUnused');
            const rowsCell = tbl.querySelector('td.pvtRows');

            // Apply persisted collapse state on the Unused column. Collapsed
            // width is fixed at 28px regardless of measured min, so the user
            // can free up horizontal space for the renderer area.
            const collapsedPref = localStorage.getItem('se_pivot_unused_collapsed') === 'true';
            if (unusedCell) unusedCell.classList.toggle('pvt-unused-collapsed', collapsedPref);
            colEls[0].style.width = collapsedPref
                ? '28px'
                : Math.max(tbl._minCol1, savedCol1) + 'px';
            colEls[1].style.width = Math.max(tbl._minCol2, savedCol2) + 'px';

            if (tbl._resizersAdded) return;
            tbl._resizersAdded = true;

            // Insert a collapse / expand toggle in the top-right of pvtUnused.
            // Clicking it persists the state to localStorage and re-applies
            // col 1 width without touching the saved drag-resize value.
            if (unusedCell && !unusedCell.querySelector(':scope > .pvt-collapse-btn')) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pvt-collapse-btn';
                btn.title = 'ซ่อน/แสดงรายการ field';
                btn.textContent = collapsedPref ? '»' : '«';
                unusedCell.appendChild(btn);
                btn.addEventListener('click', ev => {
                    ev.stopPropagation();
                    const nowCollapsed = !unusedCell.classList.contains('pvt-unused-collapsed');
                    localStorage.setItem('se_pivot_unused_collapsed', String(nowCollapsed));
                    unusedCell.classList.toggle('pvt-unused-collapsed', nowCollapsed);
                    btn.textContent = nowCollapsed ? '»' : '«';
                    if (nowCollapsed) {
                        colEls[0].style.width = '28px';
                    } else {
                        const s = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
                        const w = Math.max(tbl._minCol1, parseInt(s.col1, 10) || 260);
                        colEls[0].style.width = w + 'px';
                    }
                    updatePivotHScroll();
                });
            }

            function makeHandle(cell, colIdx) {
                if (!cell) return;
                if (cell.querySelector(':scope > .pvt-resizer')) return;
                const handle = document.createElement('div');
                handle.className = 'pvt-resizer';
                cell.appendChild(handle);
                handle.addEventListener('mousedown', e => {
                    const startX = e.clientX;
                    const startW = parseInt(colEls[colIdx].style.width, 10)
                        || cell.getBoundingClientRect().width;
                    const minW = colIdx === 0 ? tbl._minCol1 : tbl._minCol2;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    const onMove = ev => {
                        const w = Math.max(minW, Math.min(800, startW + ev.clientX - startX));
                        colEls[colIdx].style.width = w + 'px';
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        localStorage.setItem('se_pivot_widths', JSON.stringify({
                            col1: colEls[0].style.width,
                            col2: colEls[1].style.width,
                        }));
                        updatePivotHScroll();
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    e.preventDefault();
                });
            }

            makeHandle(unusedCell, 0);
            makeHandle(rowsCell, 1);
        }

        document.querySelectorAll('input[name=view]').forEach(radio => {
            radio.addEventListener('change', (e) => switchView(e.target.value));
        });

        // ========== PIVOT ==========
        async function buildPivot() {
            if (!lastRecords || lastRecords.length === 0) return;
            const el = document.getElementById('pivotOutput');
            try {
                // On first entry the jQuery / PivotTable / Plotly bundle
                // hasn't loaded yet — fetch it now and show a placeholder
                // so the user knows why the tab is briefly empty.
                if (!pivotAssetState.loaded) {
                    el.innerHTML = '<div style="padding:24px;color:#94a3b8;font-size:13px;">กำลังโหลด Pivot...</div>';
                    await loadPivotAssets();
                    // While we were awaiting, the user may have switched
                    // away or fetched new data. Re-validate before
                    // continuing — buildPivot will be re-triggered by
                    // switchView / fetch-done when needed.
                    if (!lastRecords || lastRecords.length === 0) {
                        el.innerHTML = '';
                        return;
                    }
                }
                const rt = document.querySelector('input[name=report_type]:checked').value;
                const cols = COLUMN_MAP[rt] || [];
                const validLabels = new Set(cols.map(([, label]) => label));

                // Reuse the label-keyed row array if the same report type is
                // already memoized for the current lastRecords. _pivotCache
                // is cleared whenever lastRecords changes (see
                // invalidateAllDataCaches), so a cache hit here is always
                // against the live dataset.
                let data;
                if (_pivotCache && _pivotCache.rt === rt) {
                    data = _pivotCache.data;
                } else {
                    data = lastRecords.map(record => {
                        const row = {};
                        cols.forEach(([key, label]) => { row[label] = record[key] ?? ''; });
                        return row;
                    });
                    _pivotCache = { rt, data };
                }

                // Restore prior config saved per report type. Field selections
                // (rows/cols/vals) are filtered against the current column set
                // so a config from one report type doesn't break the other.
                const storageKey = 'se_pivot_config_' + rt;
                let savedCfg = {};
                try { savedCfg = JSON.parse(localStorage.getItem(storageKey) || '{}'); }
                catch (_) { savedCfg = {}; }
                const filterLabels = arr => Array.isArray(arr)
                    ? arr.filter(l => validLabels.has(l)) : [];
                const filterInclusions = obj => {
                    if (!obj || typeof obj !== 'object') return {};
                    const out = {};
                    Object.keys(obj).forEach(k => {
                        if (validLabels.has(k)) out[k] = obj[k];
                    });
                    return out;
                };

                $(el).empty();
                const rowFields = filterLabels(savedCfg.rows);
                const colFields = filterLabels(savedCfg.cols);

                $(el).pivotUI(data, {
                    rows: rowFields,
                    cols: colFields,
                    vals: filterLabels(savedCfg.vals),
                    aggregatorName: savedCfg.aggregatorName || 'Count',
                    rendererName: savedCfg.rendererName || 'Table',
                    inclusions: filterInclusions(savedCfg.inclusions),
                    exclusions: filterInclusions(savedCfg.exclusions),
                    // Default is 500; raise so fields with many unique values
                    // (e.g. claim numbers ~600+) still render the checklist.
                    menuLimit: 20000,
                    // Natural sort so numeric-looking strings (claim no.) order
                    // correctly instead of lexicographically.
                    sorters: function () { return $.pivotUtilities.naturalSort; },
                    rowOrder: 'key_a_to_z',
                    colOrder: 'key_a_to_z',
                    renderers: $.extend(
                        $.pivotUtilities.renderers,
                        $.pivotUtilities.plotly_renderers
                    ),
                    onRefresh: function (cfg) {
                        // Strip non-serializable bits (functions, derived data
                        // sources) before persisting.
                        const persistable = {
                            rows: cfg.rows || [],
                            cols: cfg.cols || [],
                            vals: cfg.vals || [],
                            aggregatorName: cfg.aggregatorName,
                            rendererName: cfg.rendererName,
                            inclusions: cfg.inclusions || {},
                            exclusions: cfg.exclusions || {},
                        };
                        try {
                            localStorage.setItem(storageKey, JSON.stringify(persistable));
                        } catch (_) { /* quota or private mode — ignore */ }
                    },
                }, true);
                attachPivotResizers();
            } catch (e) {
                el.textContent = 'An error occurred rendering the PivotTable UI.';
                console.error('buildPivot error:', e);
            }
        }

        // ========== EXPORT XLSX ==========
        const exportBtn = document.getElementById('exportBtn');
        exportBtn.addEventListener('click', () => {
            if (!lastRecords || lastRecords.length === 0) return;
            const selected = getSelectedColumns();
            if (selected.length === 0) return;
            const filtered = getFilteredRecords();
            const textCols = new Set(['claim_no']);

            const header = selected.map(c => c.label);
            const rows = filtered.map(record =>
                selected.map(col => record[col.key] ?? '')
            );
            const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);

            // Force text format for textCols
            const textColIdx = [];
            selected.forEach((col, i) => { if (textCols.has(col.key)) textColIdx.push(i); });
            for (let r = 1; r <= filtered.length; r++) {
                textColIdx.forEach(c => {
                    const cell = ws[XLSX.utils.encode_cell({ r, c })];
                    if (cell) { cell.t = 's'; cell.v = String(cell.v); }
                });
            }

            // Auto column width
            ws['!cols'] = selected.map((col, i) => {
                let max = col.label.length;
                filtered.forEach(record => {
                    const len = String(record[col.key] ?? '').length;
                    if (len > max) max = len;
                });
                return { wch: Math.min(max + 2, 40) };
            });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            const rt = document.querySelector('input[name=report_type]:checked').value;
            const df = document.getElementById('date_from').value;

            XLSX.writeFile(wb, `SE_Report_${rt}_${df}_${dt}.xlsx`);

        function _loadUniverScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => resolve();
                s.onerror = () => reject(new Error('Failed to load script: ' + src));

        // ===== Pivot stack lazy-loader =====
        // jQuery + jQuery UI + PivotTable.js + Plotly are only needed when
        // the user actually opens the Pivot tab. Loading them on first
        // tab entry (instead of at page load) saves ~1MB gzip — most of
        // which is Plotly.
        const PIVOT_URLS = {
            jqueryUiCss:     'https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.css',
            pivotCss:        'https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.css',
            jquery:          'https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js',

            pivot:           'https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.js',

        function loadPivotAssets() {
            if (pivotAssetState.loaded) return Promise.resolve();
            if (pivotAssetState.loadingPromise) return pivotAssetState.loadingPromise;

            pivotAssetState.loadingPromise = (async () => {
                // CSS in parallel — non-blocking.
                _loadUniverCss(PIVOT_URLS.jqueryUiCss);
                _loadUniverCss(PIVOT_URLS.pivotCss);
                // Order matters: jQuery must define $/jQuery before
                // jQuery UI and PivotTable register against it. Plotly
                // is independent of jQuery but the plotly_renderers
                // adapter expects both Plotly and PivotTable globals.
                await _loadUniverScript(PIVOT_URLS.jquery);
                await _loadUniverScript(PIVOT_URLS.jqueryUi);
                await _loadUniverScript(PIVOT_URLS.pivot);
                await _loadUniverScript(PIVOT_URLS.plotly);
                await _loadUniverScript(PIVOT_URLS.plotlyRenderers);
                if (typeof window.$ === 'undefined' ||
                    typeof window.$.pivotUtilities === 'undefined') {
                    throw new Error('Pivot globals not found after script load');
                }
                pivotAssetState.loaded = true;
            })();

            return pivotAssetState.loadingPromise.catch(err => {
                pivotAssetState.loadingPromise = null;
                throw err;

        function loadUniverAssets() {

                 UNIVER_URLS.cssDataValidation, UNIVER_URLS.cssDrawing,
                 UNIVER_URLS.cssHyperLink].forEach(_loadUniverCss);

                // Base deps must load before Univer UMDs (sequential to be safe)

                await _loadUniverScript(UNIVER_URLS.reactDom);
                await _loadUniverScript(UNIVER_URLS.rxjs);

                await _loadUniverScript(UNIVER_URLS.coreLocale);
                // Optional feature presets — load best-effort; if any fail to

                const optional = [
                    [UNIVER_URLS.filter,         UNIVER_URLS.filterLocale],
                    [UNIVER_URLS.sort,           UNIVER_URLS.sortLocale],
                    [UNIVER_URLS.findReplace,    UNIVER_URLS.findReplaceLocale],

        // Cell value type tags used by Univer's IWorkbookData.cellData:
        //   1 = STRING, 2 = NUMBER. (Others exist for booleans/forces, not used here.)
        const UNIVER_T_STRING = 1;
        const UNIVER_T_NUMBER = 2;

        // Rows scanned to infer a column's numeric/string type. Big datasets
        // would otherwise pay O(rows) per numeric-looking column just to
        // confirm — sampling 200 rows is enough for the iSurvey schema
        // (numeric columns are uniformly numeric in practice; text columns
        // are pinned via SHEET_TEXT_KEYS). The cell loop has a per-cell
        // fallback for the rare 'numeric-by-sample but mixed' edge case.
        const TYPE_INFER_SAMPLE = 200;
        // Rows per chunk when building cellData. The overlay can repaint
        // and the browser stays responsive between chunks; 5k is small
        // enough for sub-100ms work per chunk on typical hardware while
        // keeping total yield count low (50k rows = 10 yields).
        const WORKBOOK_CHUNK = 5000;

        async function recordsToUniverWorkbook(records, columns, name, onProgress) {
            // Decide per-column type up front so a column is uniform — Univer's
            // built-in filter UI groups unique values by raw value, and mixed
            // types in one column can produce odd ordering. Sampled to
            // TYPE_INFER_SAMPLE non-blank rows; text columns (claim_no etc.)
            // are always string.
            const colTypes = columns.map((col) => {
                if (SHEET_TEXT_KEYS.has(col.key)) return 's';
                let allNumeric = true;
                let sawValue = false;
                const limit = Math.min(records.length, TYPE_INFER_SAMPLE);
                for (let i = 0; i < limit; i++) {
                    const raw = records[i][col.key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (typeof raw === 'string' && raw.trim() === '') continue;
                    sawValue = true;
                    const num = Number(raw);
                    if (!Number.isFinite(num)) { allNumeric = false; break; }
                }
                return (sawValue && allNumeric) ? 'n' : 's';
            });

            // cellData shape: { [rowIdx]: { [colIdx]: { v, t, s? } } }
            // Sparse — only emit non-empty cells.
            const cellData = { 0: {} };
            // Header row (row 0)
            for (let c = 0; c < columns.length; c++) {
                cellData[0][c] = {
                    v: columns[c].label,
                    t: UNIVER_T_STRING,
                    s: { bl: 1, bg: { rgb: '#f1f5f9' }, cl: { rgb: '#1e293b' } },
                };
            }
            // Data rows — chunked + async-yielding so the overlay text/
            // spinner repaints between chunks. Inner column loop is a
            // tight for() (not forEach) because it runs records.length ×
            // columns.length times; closures per cell add up to tens of
            // ms at 50k+ rows.
            const total = records.length;
            const nCols = columns.length;
            for (let i = 0; i < total; i++) {
                const rec = records[i];
                const r = i + 1;
                const row = {};
                let touched = false;
                for (let c = 0; c < nCols; c++) {
                    const raw = rec[columns[c].key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (colTypes[c] === 'n') {
                        const num = Number(raw);
                        if (Number.isFinite(num)) {
                            row[c] = { v: num, t: UNIVER_T_NUMBER };
                        } else {
                            // Sample said numeric, this value isn't —
                            // fall back to string for THIS cell so we
                            // don't write a NaN-valued numeric cell.
                            row[c] = { v: String(raw), t: UNIVER_T_STRING };
                        }
                    } else {
                        row[c] = { v: String(raw), t: UNIVER_T_STRING };
                    }
                    touched = true;
                }
                if (touched) cellData[r] = row;
                if ((i + 1) % WORKBOOK_CHUNK === 0 && i + 1 < total) {
                    if (onProgress) onProgress(i + 1, total);
                    // setTimeout(0) gives the browser one frame to repaint
                    // the overlay text before resuming.
                    await new Promise(res => setTimeout(res, 0));
                }
            }
            if (onProgress) onProgress(total, total);

            sheetState.recordCount = records.length;
            sheetState.colCount = columns.length;

            const sheetId = 'sheet-' + Date.now();
            return {
                id: 'wb-' + Date.now(),
                name: name || 'SE Report Workbook',
                appVersion: '0.10.0',
                locale: 'enUS',
                sheetOrder: [sheetId],
                sheets: {
                    [sheetId]: {
                        id: sheetId,
                        name: 'Sheet1',
                        rowCount: Math.max(records.length + 50, 200),
                        columnCount: Math.max(columns.length + 5, 26),
                        cellData,
                        mergeData: [],
                        freeze: { startRow: 1, startColumn: 0, ySplit: 1, xSplit: 0 },
                        defaultColumnWidth: 110,
                        defaultRowHeight: 24,
                    },
                },
                styles: {},
                resources: [],
            };
        }

        function mountUniver(workbookData, label) {
            const host = document.getElementById('univerHost');
            setSheetEmptyVisible(false);

            // Dispose previous Univer instance, if any. Easier than swapping
            // workbook in-place since createWorkbook in Univer can leave the
            // prior unit around.
            if (sheetState.univer) {
                try { sheetState.univer.dispose(); } catch (e) { console.warn(e); }
                sheetState.univer = null;
                sheetState.univerAPI = null;
                sheetState.mounted = false;
            }
            // Clear any leftover mount children (preserve overlay/empty msg)
            Array.from(host.childNodes).forEach(node => {
                if (node.id !== 'sheetLoadingOverlay' && node.id !== 'sheetEmptyMessage') {
                    host.removeChild(node);
                }
            });
            const mountDiv = document.createElement('div');
            mountDiv.id = 'univerMount';
            host.appendChild(mountDiv);

            const { createUniver } = UniverPresets;
            const { LocaleType, mergeLocales } = UniverCore;

            const presets = [
                UniverPresetSheetsCore.UniverSheetsCorePreset({
                    container: 'univerMount',
                    // Flatten the multi-tab ribbon (Start | Formulas | Data)
                    // into a single horizontal row so Filter/Sort/Search
                    // from the Data tab are visible at all times without
                    // tab switching. The 'simple' variant is documented
                    // in Univer's UI config.
                    ribbonType: 'simple',
                }),
            ];
            const localeBits = [
                typeof UniverPresetSheetsCoreEnUS !== 'undefined' ? UniverPresetSheetsCoreEnUS : {},
            ];

            // Add optional presets that were loaded successfully. Naming
            // follows Univer's convention: package @univerjs/preset-sheets-X
            // exposes window.UniverPresetSheetsX and UniverPresetSheetsXEnUS.
            const opt = [
                ['UniverPresetSheetsFilter',              'UniverSheetsFilterPreset',              'UniverPresetSheetsFilterEnUS'],
                ['UniverPresetSheetsSort',                'UniverSheetsSortPreset',                'UniverPresetSheetsSortEnUS'],
                ['UniverPresetSheetsFindReplace',         'UniverSheetsFindReplacePreset',         'UniverPresetSheetsFindReplaceEnUS'],
                ['UniverPresetSheetsConditionalFormatting','UniverSheetsConditionalFormattingPreset','UniverPresetSheetsConditionalFormattingEnUS'],
                ['UniverPresetSheetsDataValidation',       'UniverSheetsDataValidationPreset',       'UniverPresetSheetsDataValidationEnUS'],
                ['UniverPresetSheetsDrawing',              'UniverSheetsDrawingPreset',              'UniverPresetSheetsDrawingEnUS'],
                ['UniverPresetSheetsHyperLink',            'UniverSheetsHyperLinkPreset',            'UniverPresetSheetsHyperLinkEnUS'],
            ];
            for (const [ns, preset, locale] of opt) {
                const nsObj = window[ns];
                if (nsObj && typeof nsObj[preset] === 'function') {
                    try { presets.push(nsObj[preset]()); } catch (e) {
                        console.warn(`Univer preset ${preset} init failed`, e);
                    }
                }
                if (window[locale]) localeBits.push(window[locale]);
            }

            const { univer, univerAPI } = createUniver({
                locale: LocaleType.EN_US,
                locales: { [LocaleType.EN_US]: mergeLocales.apply(null, localeBits) },
                presets,
            });

            univerAPI.createWorkbook(workbookData);

            sheetState.univer = univer;
            sheetState.univerAPI = univerAPI;
            sheetState.currentData = workbookData;
            sheetState.sourceLabel = label || '';
            sheetState.mounted = true;
            setSheetDirty(false);
            setSheetStatus(label || '');

            // Attach a dirty-tracking listener. Univer's command system fires
            // for every mutation (type === 2 in the CommandType enum). We
            // suppress dirty marking for the first 500ms because the initial
            // createWorkbook itself dispatches commands.
            const mountedAt = Date.now();
            try {
                if (typeof univerAPI.onCommandExecuted === 'function') {
                    univerAPI.onCommandExecuted((cmd) => {
                        if (Date.now() - mountedAt < 500) return;
                        // type === 2 is "Mutation" in Univer's CommandType enum
                        if (cmd && (cmd.type === 2 || cmd.type === 'mutation')) {
                            if (!sheetState.dirty) setSheetDirty(true);
                        }
                    });
                }
            } catch (e) {
                console.warn('Failed to attach Univer change listener:', e);
            }
        }

        async function enterSpreadsheetTab() {
            if (sheetState.mounted) return; // already populated; preserve in-memory state

            // No data yet: show empty message + still preload assets so Open works
            if (!lastRecords || lastRecords.length === 0) {
                setSheetEmptyVisible(true);
                setSheetStatus('');
                try {
                    setSheetOverlay(true, 'กำลังโหลด Univer (เตรียมไว้สำหรับ Open)...');
                    await loadUniverAssets();
                } catch (e) {
                    console.error('Univer preload failed:', e);
                    setSheetStatus('โหลด Univer ไม่สำเร็จ — เช็คเน็ต/unpkg');
                } finally {
                    setSheetOverlay(false);
                }
                return;
            }

            const selected = getSelectedColumns();
            if (selected.length === 0) {
                setSheetEmptyVisible(true);
                setSheetEmptyText('กรุณาเลือกอย่างน้อย 1 คอลัมน์ใน sidebar Columns');
                return;
            }

            const filtered = getFilteredRecords();

            if (filtered.length > SHEET_PERF_THRESHOLD) {
                const ok = confirm(
                    `Dataset มี ${filtered.length.toLocaleString()} rows — ` +
                    `อาจใช้เวลาโหลดและทำงานช้า\n\nต้องการดำเนินการต่อ?`
                );
                if (!ok) {
                    document.getElementById('v_table').checked = true;
                    switchView('table');
                    return;
                }
            }

            setSheetOverlay(true, 'กำลังโหลด Univer...');
            try {
                await loadUniverAssets();
                setSheetOverlay(true, `กำลังสร้าง workbook (${filtered.length.toLocaleString()} rows × ${selected.length} cols)...`);
                // Yield so the spinner paints before the synchronous mount work
                await new Promise(r => setTimeout(r, 30));
                const wb = await recordsToUniverWorkbook(
                    filtered, selected, null,
                    (done, total) => setSheetOverlay(
                        true,
                        `กำลังสร้าง workbook... ${done.toLocaleString()}/${total.toLocaleString()} rows`,
                    ),
                );
                setSheetOverlay(true, 'กำลัง mount workbook...');
                await new Promise(r => setTimeout(r, 0));
                mountUniver(
                    wb,
                    `จากข้อมูล: ${filtered.length.toLocaleString()} rows × ${selected.length} cols`
                );
            } catch (e) {
                console.error('Univer mount failed:', e);
                setSheetEmptyVisible(true);
                setSheetEmptyText(`โหลด Univer ล้มเหลว:<br><code>${(e && e.message) || e}</code><br><br>ตรวจสอบ network / unpkg แล้วลองสลับ tab อีกครั้ง`);
            } finally {
                setSheetOverlay(false);
            }
        }

        async function newFromData() {
            if (sheetState.dirty && !confirm('มีการแก้ไขที่ยังไม่ได้บันทึก — สร้าง workbook ใหม่จะทับของเดิม\n\nต้องการต่อ?')) return;
            if (!lastRecords || lastRecords.length === 0) {
                alert('ยังไม่มีข้อมูล — กรุณา Fetch ก่อน');
                return;
            }
            const selected = getSelectedColumns();
            if (selected.length === 0) {
                alert('กรุณาเลือกอย่างน้อย 1 คอลัมน์ใน sidebar Columns');
                return;
            }
            const filtered = getFilteredRecords();
            if (filtered.length > SHEET_PERF_THRESHOLD) {
                if (!confirm(`Dataset มี ${filtered.length.toLocaleString()} rows — อาจช้า\n\nต้องการต่อ?`)) return;
            }
            try {
                setSheetOverlay(true, 'กำลังสร้าง workbook ใหม่...');
                await loadUniverAssets();
                await new Promise(r => setTimeout(r, 30));
                const wb = await recordsToUniverWorkbook(
                    filtered, selected, null,
                    (done, total) => setSheetOverlay(
                        true,
                        `กำลังสร้าง workbook... ${done.toLocaleString()}/${total.toLocaleString()} rows`,
                    ),
                );
                setSheetOverlay(true, 'กำลัง mount workbook...');
                await new Promise(r => setTimeout(r, 0));
                sheetState.mounted = false;
                mountUniver(
                    wb,
                    `จากข้อมูล: ${filtered.length.toLocaleString()} rows × ${selected.length} cols`
                );
            } catch (e) {
                console.error(e);
                alert('สร้าง workbook ไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
            }
        }

        function tsForFilename() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
        }

        // Pull the latest workbook snapshot from Univer's facade API.
        // Falls back to sheetState.currentData if the API is unavailable
        // (e.g. before first mount).
        function getCurrentUniverSnapshot() {
            if (sheetState.univerAPI) {
                try {
                    const fWb = sheetState.univerAPI.getActiveWorkbook();
                    if (fWb && typeof fWb.getSnapshot === 'function') {
                        return fWb.getSnapshot();
                    }
                } catch (e) {
                    console.warn('getSnapshot failed:', e);
                }
            }
            return sheetState.currentData;
        }

        function saveSheetJson() {
            const snapshot = getCurrentUniverSnapshot();
            if (!snapshot || !snapshot.sheets) {
                alert('ยังไม่มี workbook ให้บันทึก');
                return;
            }
            try {
                sheetState.currentData = snapshot;
                const json = JSON.stringify(snapshot);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SE_Report_workbook_${tsForFilename()}.univer.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                setSheetDirty(false);
                setSheetStatus(`บันทึกแล้ว (${(blob.size / 1024 / 1024).toFixed(2)} MB)`);
            } catch (e) {
                console.error(e);
                alert('บันทึกไม่สำเร็จ: ' + (e && e.message || e));
            }
        }

        function openSheetJson() {
            if (sheetState.dirty && !confirm('มีการแก้ไขที่ยังไม่ได้บันทึก — เปิดไฟล์ใหม่จะทับของเดิม\n\nต้องการต่อ?')) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.style.display = 'none';
            input.addEventListener('change', async () => {
                const file = input.files && input.files[0];
                document.body.removeChild(input);
                if (!file) return;
                try {
                    setSheetOverlay(true, `กำลังอ่านไฟล์ ${file.name}...`);
                    await loadUniverAssets();
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (!data || typeof data !== 'object' || !data.sheets) {
                        throw new Error('รูปแบบไฟล์ไม่ถูกต้อง — คาดว่าเป็น Univer workbook JSON (.univer.json)');
                    }
                    sheetState.mounted = false;
                    mountUniver(data, `เปิดจากไฟล์: ${file.name}`);
                } catch (e) {
                    console.error(e);
                    alert('เปิดไฟล์ไม่สำเร็จ: ' + (e && e.message || e));
                } finally {
                    setSheetOverlay(false);
                }
            });
            document.body.appendChild(input);
            input.click();
        }

        function saveSheetXlsx() {
            const snapshot = getCurrentUniverSnapshot();
            if (!snapshot || !snapshot.sheets) {
                alert('ยังไม่มี workbook ให้บันทึก');
                return;
            }
            try {
                const sheetId = (snapshot.sheetOrder && snapshot.sheetOrder[0]) ||
                                Object.keys(snapshot.sheets)[0];
                const sheet = snapshot.sheets[sheetId];
                const cellData = (sheet && sheet.cellData) || {};
                // Build the SheetJS worksheet directly from the sparse
                // cellData instead of materializing a dense (maxR+1)×(maxC+1)
                // array of '' first. At 50k×49 the dense pre-fill alone
                // allocates ~2.5M strings; the sparse write iterates only
                // the cells that actually exist (usually <1M).
                const ws = {};
                let maxR = -1, maxC = -1;
                for (const rkey in cellData) {
                    if (!Object.prototype.hasOwnProperty.call(cellData, rkey)) continue;
                    const ri = +rkey;
                    if (ri > maxR) maxR = ri;
                    const rowCells = cellData[rkey];
                    for (const ckey in rowCells) {
                        if (!Object.prototype.hasOwnProperty.call(rowCells, ckey)) continue;
                        const ci = +ckey;
                        if (ci > maxC) maxC = ci;
                        const cell = rowCells[ckey];
                        const v = cell && cell.v;
                        if (v === null || v === undefined || v === '') continue;
                        const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
                        const t = (typeof v === 'number' && Number.isFinite(v)) ? 'n' : 's';
                        ws[addr] = { v, t };
                    }
                }
                if (maxR < 0 || maxC < 0) {
                    alert('Sheet ว่างเปล่า');
                    return;
                }
                // SheetJS requires '!ref' to define the worksheet's
                // bounding range; without it the file opens but Excel
                // sees an empty sheet.
                ws['!ref'] = XLSX.utils.encode_range({
                    s: { r: 0, c: 0 },
                    e: { r: maxR, c: maxC },
                });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, sheet.name || 'Sheet1');
                XLSX.writeFile(wb, `SE_Report_workbook_${tsForFilename()}.xlsx`);
                setSheetStatus('บันทึก .xlsx แล้ว (สูตรเป็นค่า — lossy)');
            } catch (e) {
                console.error(e);
                alert('บันทึก .xlsx ไม่สำเร็จ: ' + (e && e.message || e));
            }
        }

        document.getElementById('sheetNewBtn').addEventListener('click', newFromData);
        document.getElementById('sheetOpenBtn').addEventListener('click', openSheetJson);
        document.getElementById('sheetSaveBtn').addEventListener('click', saveSheetJson);
        document.getElementById('sheetSaveXlsxBtn').addEventListener('click', saveSheetXlsx);

        window.addEventListener('beforeunload', (e) => {
            if (sheetState.dirty) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // ========== FORM SUBMIT (SSE STREAMING) ==========
        let abortController = null;
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (abortController) abortController.abort();
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            status.className = '';
            status.textContent = '';
            thead.innerHTML = ''; tbody.innerHTML = '';
            table.style.display = 'none';
            btn.disabled = true;
            exportBtn.style.display = 'none';
            lastRecords = null;
            columnFilters = {};
            invalidateAllDataCaches();

            progressFill.style.width = '0%';
            progressText.textContent = 'Connecting...';
            progressContainer.classList.add('active');

            abortController = new AbortController();
            const formData = new FormData(this);

            try {
                const res = await fetch('/fetch-stream', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal,
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();

                    for (const part of parts) {
                        if (!part.trim()) continue;
                        let eventType = null, dataStr = null;
                        for (const line of part.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
                            else if (line.startsWith('data: ')) dataStr = line.slice(6);
                        }
                        if (!eventType || !dataStr) continue;
                        const payload = JSON.parse(dataStr);

                        if (eventType === 'progress') {
                            const pct = payload.total > 0 ? Math.round((payload.fetched / payload.total) * 100) : 0;
                            progressFill.style.width = pct + '%';
                            progressText.textContent = `Page ${payload.page} — ${payload.fetched.toLocaleString()}/${payload.total.toLocaleString()} records (${pct}%)`;
                        } else if (eventType === 'error') {
                            throw new Error(payload.error);
                        } else if (eventType === 'done') {
                            const records = payload.data;
                            if (!records || records.length === 0) {
                                status.textContent = 'No data found.';
                            } else {
                                lastRecords = records;
                                invalidateAllDataCaches();
                                renderTable();
                                // inline-flex preserves the inherited
                                // align/justify-center from .toolbar-controls
                                // button so the SVG icon stays centered.
                                exportBtn.style.display = 'inline-flex';
                                // Invalidate the Univer workbook so the next
                                // time the user enters the Spreadsheet tab
                                // (or if they're already on it) the view
                                // remounts against the freshly-fetched data
                                // instead of preserving the previous Fetch's
                                // rows. enterSpreadsheetTab's early-return
                                // gates on sheetState.mounted; clearing it
                                // here is what lets the rebuild run.
                                sheetState.mounted = false;
                                // Kick off Univer CDN download in the
                                // background while the user explores
                                // Table view. By the time they click
                                // Sheet tab the ~2MB of scripts/CSS
                                // is usually already resolved, so the
                                // tab feels instant instead of pausing
                                // on "กำลังโหลด Univer...". Fire-and-
                                // forget; enterSpreadsheetTab retries
                                // on its own if the preload errored.
                                loadUniverAssets().catch(() => {});
                                const activeView = document.querySelector('input[name=view]:checked').value;
                                switchView(activeView);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    status.textContent = 'Fetch cancelled.';
                } else {
                    status.className = 'error';
                    status.textContent = 'Error: ' + err.message;
                }
            } finally {
                btn.disabled = false;
                progressContainer.classList.remove('active');
                abortController = null;
            }
        });
    </script>
</body>
</html>
