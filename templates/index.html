                if (view === 'pivot' || view === 'spreadsheet') sidebar.classList.add('collapsed');
                else sidebar.classList.remove('collapsed');
            }
            if (view === 'pivot' && lastRecords) buildPivot();
            if (view === 'spreadsheet') enterSpreadsheetTab();
            updatePivotHScroll();
        }

        // ========== STICKY HORIZONTAL SCROLLBAR (PIVOT) ==========
        let pivotHScrollSyncing = false;
        let pivotHScrollTarget = null;
        function findPivotScrollTarget() {
            // Walk up from #pivotOutput to find the first ancestor that actually scrolls horizontally
            let el = document.getElementById('pivotOutput');
            while (el && el !== document.body) {
                if (el.scrollWidth > el.clientWidth + 1) {
                    const ovX = getComputedStyle(el).overflowX;
                    if (ovX === 'auto' || ovX === 'scroll') return el;
                }
                el = el.parentElement;
            }
            return null;
        }
        function ensurePivotHScroll() {
            let bar = document.getElementById('pivotHScroll');
            if (bar) return bar;
            bar = document.createElement('div');
            bar.id = 'pivotHScroll';
            bar.appendChild(document.createElement('div'));
            document.body.appendChild(bar);
            bar.addEventListener('scroll', () => {
                if (pivotHScrollSyncing || !pivotHScrollTarget) return;
                pivotHScrollSyncing = true;
                pivotHScrollTarget.scrollLeft = bar.scrollLeft;
                pivotHScrollSyncing = false;
            });
            window.addEventListener('resize', updatePivotHScroll);
            return bar;
        }
        function attachPivotScrollListener(target) {
            if (!target || target._pivotHScrollAttached) return;
            target._pivotHScrollAttached = true;
            target.addEventListener('scroll', () => {
                if (pivotHScrollSyncing) return;
                const bar = document.getElementById('pivotHScroll');
                if (!bar) return;
                pivotHScrollSyncing = true;
                bar.scrollLeft = target.scrollLeft;
                pivotHScrollSyncing = false;
            });
        }
        function updatePivotHScroll() {
            const pv = document.getElementById('pivotView');
            const bar = document.getElementById('pivotHScroll');
            if (!pv || pv.style.display === 'none') {
                if (bar) bar.style.display = 'none';
                return;
            }
            const target = findPivotScrollTarget();
            if (!target) {
                if (bar) bar.style.display = 'none';
                return;
            }
            pivotHScrollTarget = target;
            attachPivotScrollListener(target);
            const b = ensurePivotHScroll();
            const rect = target.getBoundingClientRect();
            const visibleBottom = Math.min(rect.bottom, window.innerHeight);
            b.style.left = rect.left + 'px';
            b.style.top = (visibleBottom - 14) + 'px';
            b.style.width = Math.min(rect.width, window.innerWidth - rect.left) + 'px';
            b.firstChild.style.width = target.scrollWidth + 'px';
            b.scrollLeft = target.scrollLeft;
            b.style.display = 'block';
        }
        // Re-measure after pivot DOM mutations (drag, expand, render)
        const _pivotObserver = new MutationObserver(() => {
            requestAnimationFrame(() => {
                attachPivotResizers();
                attachFilterBoxDrag();
                attachPivotTopBar();
                updatePivotHScroll();
            });
        });
        _pivotObserver.observe(document.getElementById('pivotOutput'), { childList: true, subtree: true });

        // Lift the renderer ("Table") selector out of pvtUi's first cell up to
        // a custom top bar, with the record count on the right. PivotTable.js
        // rebuilds the whole table when the user changes the renderer, so we
        // move the new <select> on every observer fire.
        function attachPivotTopBar() {
            const pivotView = document.getElementById('pivotView');
            if (!pivotView) return;
            let topBar = pivotView.querySelector(':scope > .pivot-top-bar');
            if (!topBar) {
                topBar = document.createElement('div');
                topBar.className = 'pivot-top-bar';
                topBar.innerHTML =
                    '<div class="pivot-top-left"></div>' +
                    '<div class="pivot-top-right"></div>';
                pivotView.insertBefore(topBar, pivotView.firstChild);
            }
            const left = topBar.querySelector('.pivot-top-left');
            const right = topBar.querySelector('.pivot-top-right');

            // Target the renderer <select> by its library-assigned class. Its
            // parent <td> is the cell we need to empty. Using a positional
            // selector (tr:first-child > td:first-child) was unreliable
            // because the table doesn't always have an explicit <tbody>.
            const rendererSelect = document.querySelector('#pivotOutput .pvtRenderer');
            if (rendererSelect && !left.contains(rendererSelect)) {
                const cell = rendererSelect.parentElement;
                if (cell && cell.tagName === 'TD') {
                    left.innerHTML = '';
                    while (cell.firstChild) left.appendChild(cell.firstChild);
                }
            }

            const total = (typeof lastRecords !== 'undefined' && lastRecords)
                ? lastRecords.length : 0;
            right.textContent = total ? `Showing ${total} of ${total} records` : '';
        }

        // Reposition the filter dropdown directly below the clicked triangle.
        // PivotTable.js's default positioning sometimes lands far from the
        // pill (especially when pills are in a flex-wrapped unused list).
        // Also reparent it to #pivotOutput so collapsing the Unused column
        // (which hides its <li> children) doesn't take the dropdown down
        // with it.
        document.getElementById('pivotOutput').addEventListener('click', e => {
            const tri = e.target.closest('.pvtTriangle');
            if (!tri) return;
            requestAnimationFrame(() => {
                let fb = null;
                document.querySelectorAll('.pvtFilterBox').forEach(box => {
                    if (getComputedStyle(box).display !== 'none') fb = box;
                });
                if (!fb) return;
                const pivotOutput = document.getElementById('pivotOutput');
                if (fb.parentElement !== pivotOutput) {
                    pivotOutput.appendChild(fb);
                }
                const triRect = tri.getBoundingClientRect();
                const parent = fb.offsetParent || document.body;
                const parentRect = parent.getBoundingClientRect();
                let left = triRect.left - parentRect.left;
                let top  = triRect.bottom - parentRect.top + 4;
                // Keep within viewport bounds
                const maxLeft = window.innerWidth - fb.offsetWidth - 8;
                if (left > maxLeft) left = Math.max(0, maxLeft);
                if (left < 0) left = 0;
                fb.style.left = left + 'px';
                fb.style.top  = top + 'px';
            });
        });

        // Make the pvtFilterBox draggable by its <h4> header. The library
        // positions the box near the clicked pill (sometimes off-screen),
        // so giving users a drag handle lets them park it anywhere.
        function attachFilterBoxDrag() {
            document.querySelectorAll('#pivotOutput .pvtFilterBox').forEach(fb => {
                if (fb._dragAttached) return;
                const header = fb.querySelector('h4');
                if (!header) return;
                fb._dragAttached = true;

                // Tag library buttons by their label so CSS can paint them
                // by role (primary / secondary / ghost) instead of all blue.
                // PivotTable.js wraps Select All/None and Apply/Cancel in
                // <p> tags, so use querySelectorAll to reach the buttons.
                const findBtn = label => Array.from(fb.querySelectorAll('button')).find(el =>
                    (el.textContent || '').trim().toLowerCase() === label
                );
                const selectAll  = findBtn('select all');
                const selectNone = findBtn('select none');
                const applyBtn   = findBtn('apply');
                const cancelBtn  = findBtn('cancel');
                if (selectAll)  selectAll.classList.add('pvt-btn-ghost');
                if (selectNone) selectNone.classList.add('pvt-btn-ghost');
                if (applyBtn)   applyBtn.classList.add('pvt-btn-primary');
                if (cancelBtn)  cancelBtn.classList.add('pvt-btn-secondary');

                // Reparent the buttons into our own containers so we can
                // control layout (right-aligned actions row + footer band).
                // The original ancestor that lives directly under fb (often
                // a <p>) is removed afterwards if it's left empty.
                function regroup(buttons, containerClass, atEnd) {
                    const valid = buttons.filter(Boolean);
                    if (!valid.length) return;
                    if (fb.querySelector(':scope > .' + containerClass)) return;
                    let anchor = valid[0];
                    while (anchor.parentElement && anchor.parentElement !== fb) {
                        anchor = anchor.parentElement;
                    }
                    const container = document.createElement('div');
                    container.className = containerClass;
                    if (atEnd) fb.appendChild(container);
                    else fb.insertBefore(container, anchor);
                    valid.forEach(b => container.appendChild(b));
                    // Drop any now-empty <p>/<br> remnants left as direct children
                    Array.from(fb.children).forEach(child => {
                        if (child === container) return;
                        if ((child.tagName === 'P' && !child.children.length &&
                             !child.textContent.trim()) ||
                            child.tagName === 'BR') {
                            child.remove();
                        }
                    });
                }
                regroup([selectAll, selectNone], 'pvt-filter-actions', false);
                regroup([cancelBtn, applyBtn], 'pvt-filter-footer', true);

                // Close button at top-right — sibling of h4 so its click
                // doesn't bubble into the drag handler.
                if (!fb.querySelector(':scope > .pvt-filter-close')) {
                    const closeBtn = document.createElement('button');
                    closeBtn.type = 'button';
                    closeBtn.className = 'pvt-filter-close';
                    closeBtn.textContent = '×';
                    closeBtn.title = 'ปิด';
                    fb.appendChild(closeBtn);
                    closeBtn.addEventListener('click', ev => {
                        ev.stopPropagation();
                        fb.style.display = 'none';
                    });
                }

                header.addEventListener('mousedown', e => {
                    const parent = fb.offsetParent || document.body;
                    const parentRect = parent.getBoundingClientRect();
                    const rect = fb.getBoundingClientRect();
                    const offX = e.clientX - rect.left;
                    const offY = e.clientY - rect.top;
                    const onMove = ev => {
                        fb.style.left = (ev.clientX - offX - parentRect.left) + 'px';
                        fb.style.top  = (ev.clientY - offY - parentRect.top)  + 'px';
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        document.body.style.userSelect = '';
                    };
                    document.body.style.userSelect = 'none';
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    e.preventDefault();
                });
            });
        }

        // Drag-to-resize for pivot UI columns (unused | rows | renderer).
        // PivotTable.js renders a <table.pvtUi> without colgroup, so widths
        // don't propagate across rows. We inject a colgroup and let CSS
        // table-layout:fixed honor the col widths. Saved in localStorage.
        function attachPivotResizers() {
            const tbl = document.querySelector('#pivotOutput table.pvtUi');
            if (!tbl) return;

            // Measure intrinsic CONTENT width of the row-1 cells (renderer
            // selector for col 1, aggregator for col 2). We sum the cell's
            // children rather than using getBoundingClientRect on the cell
            // itself, because the cell width reflects auto-layout's share of
            // the table — not the actual width of "Table" / "Count + arrows".
            function intrinsicWidth(cell) {
                if (!cell) return 0;
                let w = 0;
                for (const c of cell.children) w += c.getBoundingClientRect().width;
                const cs = getComputedStyle(cell);
                w += parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
                return Math.ceil(w) + 10; // small buffer for the resizer
            }
            if (typeof tbl._minCol1 === 'undefined') {
                tbl._minCol1 = intrinsicWidth(tbl.querySelector('tr:first-child td:first-child')) || 140;
            }
            if (typeof tbl._minCol2 === 'undefined') {
                tbl._minCol2 = intrinsicWidth(tbl.querySelector('td.pvtVals')) || 200;
            }

            // Ensure colgroup with 3 cols exists (pivot has 3 columns in row 2)
            let colgroup = tbl.querySelector(':scope > colgroup');
            if (!colgroup) {
                colgroup = document.createElement('colgroup');
                for (let i = 0; i < 3; i++) colgroup.appendChild(document.createElement('col'));
                tbl.insertBefore(colgroup, tbl.firstChild);
            }
            const colEls = colgroup.querySelectorAll('col');

            // Restore saved widths (col 3 = renderer area, stays auto).
            // Clamp to measured minimums in case localStorage holds an older
            // narrower value from before this floor was introduced.
            const saved = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
            const savedCol1 = parseInt(saved.col1, 10) || 260;
            const savedCol2 = parseInt(saved.col2, 10) || 200;
            const unusedCell = tbl.querySelector('td.pvtUnused');
            const rowsCell = tbl.querySelector('td.pvtRows');

            // Apply persisted collapse state on the Unused column. Collapsed
            // width is fixed at 28px regardless of measured min, so the user
            // can free up horizontal space for the renderer area.
            const collapsedPref = localStorage.getItem('se_pivot_unused_collapsed') === 'true';
            if (unusedCell) unusedCell.classList.toggle('pvt-unused-collapsed', collapsedPref);
            colEls[0].style.width = collapsedPref
                ? '28px'
                : Math.max(tbl._minCol1, savedCol1) + 'px';
            colEls[1].style.width = Math.max(tbl._minCol2, savedCol2) + 'px';

            if (tbl._resizersAdded) return;
            tbl._resizersAdded = true;

            // Insert a collapse / expand toggle in the top-right of pvtUnused.
            // Clicking it persists the state to localStorage and re-applies
            // col 1 width without touching the saved drag-resize value.
            if (unusedCell && !unusedCell.querySelector(':scope > .pvt-collapse-btn')) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pvt-collapse-btn';
                btn.title = 'ซ่อน/แสดงรายการ field';
                btn.textContent = collapsedPref ? '»' : '«';
                unusedCell.appendChild(btn);
                btn.addEventListener('click', ev => {
                    ev.stopPropagation();
                    const nowCollapsed = !unusedCell.classList.contains('pvt-unused-collapsed');
                    localStorage.setItem('se_pivot_unused_collapsed', String(nowCollapsed));
                    unusedCell.classList.toggle('pvt-unused-collapsed', nowCollapsed);
                    btn.textContent = nowCollapsed ? '»' : '«';
                    if (nowCollapsed) {
                        colEls[0].style.width = '28px';
                    } else {
                        const s = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
                        const w = Math.max(tbl._minCol1, parseInt(s.col1, 10) || 260);
                        colEls[0].style.width = w + 'px';
                    }
                    updatePivotHScroll();
                });
            }

            function makeHandle(cell, colIdx) {
                if (!cell) return;
                if (cell.querySelector(':scope > .pvt-resizer')) return;
                const handle = document.createElement('div');
                handle.className = 'pvt-resizer';
                cell.appendChild(handle);
                handle.addEventListener('mousedown', e => {
                    const startX = e.clientX;
                    const startW = parseInt(colEls[colIdx].style.width, 10)
                        || cell.getBoundingClientRect().width;
                    const minW = colIdx === 0 ? tbl._minCol1 : tbl._minCol2;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    const onMove = ev => {
                        const w = Math.max(minW, Math.min(800, startW + ev.clientX - startX));
                        colEls[colIdx].style.width = w + 'px';
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        localStorage.setItem('se_pivot_widths', JSON.stringify({
                            col1: colEls[0].style.width,
                            col2: colEls[1].style.width,
                        }));
                        updatePivotHScroll();
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    e.preventDefault();
                });
            }

            makeHandle(unusedCell, 0);
            makeHandle(rowsCell, 1);
        }

        document.querySelectorAll('input[name=view]').forEach(radio => {
            radio.addEventListener('change', (e) => switchView(e.target.value));
        });

        // ========== PIVOT ==========
        async function buildPivot() {
            if (!lastRecords || lastRecords.length === 0) return;
            const el = document.getElementById('pivotOutput');
            try {
                // On first entry the jQuery / PivotTable / Plotly bundle
                // hasn't loaded yet — fetch it now and show a placeholder
                // so the user knows why the tab is briefly empty.
                if (!pivotAssetState.loaded) {
                    el.innerHTML = '<div style="padding:24px;color:#94a3b8;font-size:13px;">กำลังโหลด Pivot...</div>';
                    await loadPivotAssets();
                    // While we were awaiting, the user may have switched
                    // away or fetched new data. Re-validate before
                    // continuing — buildPivot will be re-triggered by
                    // switchView / fetch-done when needed.
                    if (!lastRecords || lastRecords.length === 0) {
                        el.innerHTML = '';
                        return;
                    }
                }
                const rt = document.querySelector('input[name=report_type]:checked').value;
                const cols = COLUMN_MAP[rt] || [];
                const validLabels = new Set(cols.map(([, label]) => label));

                // Reuse the label-keyed row array if the same report type is
                // already memoized for the current lastRecords. _pivotCache
                // is cleared whenever lastRecords changes (see
                // invalidateAllDataCaches), so a cache hit here is always
                // against the live dataset.
                let data;
                if (_pivotCache && _pivotCache.rt === rt) {
                    data = _pivotCache.data;
                } else {
                    data = lastRecords.map(record => {
                        const row = {};
                        cols.forEach(([key, label]) => { row[label] = record[key] ?? ''; });
                        return row;
                    });
                    _pivotCache = { rt, data };
                }

                // Restore prior config saved per report type. Field selections
                // (rows/cols/vals) are filtered against the current column set
                // so a config from one report type doesn't break the other.
                const storageKey = 'se_pivot_config_' + rt;
                let savedCfg = {};
                try { savedCfg = JSON.parse(localStorage.getItem(storageKey) || '{}'); }
                catch (_) { savedCfg = {}; }
                const filterLabels = arr => Array.isArray(arr)
                    ? arr.filter(l => validLabels.has(l)) : [];
                const filterInclusions = obj => {
                    if (!obj || typeof obj !== 'object') return {};
                    const out = {};
                    Object.keys(obj).forEach(k => {
                        if (validLabels.has(k)) out[k] = obj[k];
                    });
                    return out;
                };

                $(el).empty();
                const rowFields = filterLabels(savedCfg.rows);
                const colFields = filterLabels(savedCfg.cols);

                $(el).pivotUI(data, {
                    rows: rowFields,
                    cols: colFields,
                    vals: filterLabels(savedCfg.vals),
                    aggregatorName: savedCfg.aggregatorName || 'Count',
                    rendererName: savedCfg.rendererName || 'Table',
                    inclusions: filterInclusions(savedCfg.inclusions),
                    exclusions: filterInclusions(savedCfg.exclusions),
                    // Default is 500; raise so fields with many unique values
                    // (e.g. claim numbers ~600+) still render the checklist.
                    menuLimit: 20000,
                    // Natural sort so numeric-looking strings (claim no.) order
                    // correctly instead of lexicographically.
                    sorters: function () { return $.pivotUtilities.naturalSort; },
                    rowOrder: 'key_a_to_z',
                    colOrder: 'key_a_to_z',
                    renderers: $.extend(
                        $.pivotUtilities.renderers,
                        $.pivotUtilities.plotly_renderers
                    ),
                    onRefresh: function (cfg) {
                        // Strip non-serializable bits (functions, derived data
                        // sources) before persisting.
                        const persistable = {
                            rows: cfg.rows || [],
                            cols: cfg.cols || [],
                            vals: cfg.vals || [],
                            aggregatorName: cfg.aggregatorName,
                            rendererName: cfg.rendererName,
                            inclusions: cfg.inclusions || {},
                            exclusions: cfg.exclusions || {},
                        };
                        try {
                            localStorage.setItem(storageKey, JSON.stringify(persistable));
                        } catch (_) { /* quota or private mode — ignore */ }
                    },
                }, true);
                attachPivotResizers();
            } catch (e) {
                el.textContent = 'An error occurred rendering the PivotTable UI.';
                console.error('buildPivot error:', e);
            }
        }

        // ========== EXPORT XLSX ==========
        const exportBtn = document.getElementById('exportBtn');
        exportBtn.addEventListener('click', async () => {
            if (!lastRecords || lastRecords.length === 0) return;
            const selected = getSelectedColumns();
            if (selected.length === 0) return;
            // SheetJS is lazy-loaded; first export pays a ~1.4 MB CDN
            // fetch. Disable the button so a frantic double-click
            // doesn't kick off two parallel builds.
            const origLabel = exportBtn.textContent;
            exportBtn.disabled = true;
            try {
                await loadSheetJsAssets();
            } catch (e) {
                console.error('SheetJS load failed:', e);
                alert('โหลด SheetJS ไม่สำเร็จ — เช็คเน็ต/CDN');
                exportBtn.disabled = false;
                exportBtn.textContent = origLabel;
                return;
            }
            const filtered = getFilteredRecords();
            const textCols = new Set(['claim_no']);

            const header = selected.map(c => c.label);
            const rows = filtered.map(record =>
                selected.map(col => record[col.key] ?? '')
            );
            const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);

            // Force text format for textCols
            const textColIdx = [];
            selected.forEach((col, i) => { if (textCols.has(col.key)) textColIdx.push(i); });
            for (let r = 1; r <= filtered.length; r++) {
                textColIdx.forEach(c => {
                    const cell = ws[XLSX.utils.encode_cell({ r, c })];
                    if (cell) { cell.t = 's'; cell.v = String(cell.v); }
                });
            }

            // Auto column width
            ws['!cols'] = selected.map((col, i) => {
                let max = col.label.length;
                filtered.forEach(record => {
                    const len = String(record[col.key] ?? '').length;
                    if (len > max) max = len;
                });
                return { wch: Math.min(max + 2, 40) };
            });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            const rt = document.querySelector('input[name=report_type]:checked').value;
            const df = document.getElementById('date_from').value;
            const dt = document.getElementById('date_to').value;
            XLSX.writeFile(wb, `SE_Report_${rt}_${df}_${dt}.xlsx`);
            exportBtn.disabled = false;
        });

        // ========== SPREADSHEET VIEW (Univer) ==========
        // Univer (https://univer.ai) ships UMD bundles via unpkg, so we
        // lazy-load all required scripts on first tab entry. All
        // persistence is client-side: Save → JSON Blob download,
        // Open → file picker + FileReader. No backend involvement.
        const UNIVER_BASE = 'https://unpkg.com';
        const UNIVER_URLS = {
            // Base browser deps (must load before Univer scripts)
            react:        `${UNIVER_BASE}/react@18.3.1/umd/react.production.min.js`,
            reactDom:     `${UNIVER_BASE}/react-dom@18.3.1/umd/react-dom.production.min.js`,
            rxjs:         `${UNIVER_BASE}/rxjs/dist/bundles/rxjs.umd.min.js`,
            // Univer presets/core (UMD)
            presets:      `${UNIVER_BASE}/@univerjs/presets/lib/umd/index.js`,
            core:         `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/umd/index.js`,
            coreLocale:   `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/umd/locales/en-US.js`,
            filter:       `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/umd/index.js`,
            filterLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/umd/locales/en-US.js`,
            sort:         `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/umd/index.js`,
            sortLocale:   `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/umd/locales/en-US.js`,
            findReplace:  `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/umd/index.js`,
            findReplaceLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/umd/locales/en-US.js`,
            cf:           `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/umd/index.js`,
            cfLocale:     `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/umd/locales/en-US.js`,
            dataValidation:       `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/umd/index.js`,
            dataValidationLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/umd/locales/en-US.js`,
            drawing:              `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/umd/index.js`,
            drawingLocale:        `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/umd/locales/en-US.js`,
            hyperLink:            `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/umd/index.js`,
            hyperLinkLocale:      `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/umd/locales/en-US.js`,
            note:                 `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/umd/index.js`,
            noteLocale:           `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/umd/locales/en-US.js`,
            table:                `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/umd/index.js`,
            tableLocale:          `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/umd/locales/en-US.js`,
            // Lower-level plugin (no preset bundle, no locale file) — adds
            // Google-Sheets-style row+column highlight for the active cell.
            // Registered manually via univer.registerPlugin() in mountUniver.
            crosshair:            `${UNIVER_BASE}/@univerjs/sheets-crosshair-highlight/lib/umd/index.js`,
            // CSS for each preset (loaded in parallel as <link>)
            cssCore:      `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/index.css`,
            cssFilter:    `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/index.css`,
            cssSort:      `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/index.css`,
            cssFindReplace: `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/index.css`,
            cssCf:        `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/index.css`,
            cssDataValidation: `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/index.css`,
            cssDrawing:        `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/index.css`,
            cssHyperLink:      `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/index.css`,
            cssNote:           `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/index.css`,
            cssTable:          `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/index.css`,
            cssCrosshair:      `${UNIVER_BASE}/@univerjs/sheets-crosshair-highlight/lib/index.css`,
        };
        const SHEET_TEXT_KEYS = new Set(['claim_no', 'notify_no', 'survey_no', 'preNotifyNo', 'policy_no', 'plate_no']);
        const SHEET_PERF_THRESHOLD = 50000;

        const sheetState = {
            loaded: false,           // CDN assets resolved
            loadingPromise: null,    // in-flight load promise (single-flight)
            mounted: false,          // Univer workbook created
            dirty: false,            // edits since last save
            currentData: null,       // last known workbook snapshot (IWorkbookData)
            univer: null,            // root Univer instance
            univerAPI: null,         // Facade API
            sourceLabel: '',
            recordCount: 0,
            colCount: 0,
            crosshairOn: false,      // Crosshair highlight toggle state
        };

        // Crosshair highlight is implemented by the @univerjs/sheets-
        // crosshair-highlight plugin. It exposes a single toggle command
        // that flips the highlight on/off; we mirror its state into a
        // boolean and an .active class on the injected tab so the user
        // knows what they're looking at without staring at the cell for
        // half a second to see if the row glow appeared.
        function setCrosshairButtonState() {
            const injected = document.querySelector('.univer-crosshair-tab');
            if (!injected) return;
            injected.classList.toggle('active', sheetState.crosshairOn);
            injected.textContent = 'โฟกัส';
        }

        async function toggleCrosshair() {
            if (!sheetState.mounted || !sheetState.univerAPI) return;
            try {
                await sheetState.univerAPI.executeCommand('sheet.operation.toggle-crosshair-highlight');
                sheetState.crosshairOn = !sheetState.crosshairOn;
                setCrosshairButtonState();
            } catch (e) {
                console.error('toggle crosshair failed:', e);
            }
        }

        // Sort the entire data region (rows 1..recordCount × cols 0..colCount-1)
        // using the leftmost column of the user's current selection as the
        // sort key. Univer's built-in sort-range-asc / -ext sorts only the
        // selected range — and because our cellData is sparse (empty cells
        // omitted, see workbook builder), the "-ext" auto-expansion fails to
        // detect a contiguous data region and falls back to sorting just the
        // one column, which leaves the other columns unmoved and breaks row
        // integrity. Forcing a full-data sort here keeps rows coherent.
        async function _runFullSheetSort(ascending) {
            if (!sheetState.univerAPI) return;
            const wb = sheetState.univerAPI.getActiveWorkbook();
            if (!wb) return;
            const sheet = wb.getActiveSheet();
            if (!sheet) return;
            const sel = sheet.getActiveRange();
            let sortKey = 0;
            if (sel) {
                if (typeof sel.getColumn === 'function') sortKey = sel.getColumn() || 0;
                else if (typeof sel.getRange === 'function') {
                    const r = sel.getRange();
                    if (r && typeof r.startColumn === 'number') sortKey = r.startColumn;
                }
            }
            const dataRows = sheetState.recordCount || 0;
            const dataCols = sheetState.colCount || 0;
            if (dataRows < 1 || dataCols < 1) return;
            const range = sheet.getRange(1, 0, dataRows, dataCols);
            if (!range || typeof range.sort !== 'function') return;
            range.sort([{ column: sortKey, ascending: !!ascending }]);
        }

        // Inject a Crosshair toggle button into Univer's tab bar as a
        // sibling of Start/Insert/Formulas/Data. Univer renders the tab
        // bar as a flex container with 4 role="tab" buttons; we attach
        // our button at the end (next to Data). Idempotent — the
        // MutationObserver re-injects if Univer wipes the tab bar (e.g.
        // on workbook re-mount).
        let _crosshairTabObserver = null;
        function injectCrosshairTab() {
            const mount = document.getElementById('univerMount');
            if (!mount) return;
            const anyTab = mount.querySelector('[role="tab"]');
            if (!anyTab) return;
            const tabBar = anyTab.parentElement;
            if (!tabBar) return;
            // Hide Data + Insert tabs — their tools are duplicated into the
            // Start ribbon by patchStartRibbonWith{Data,Insert}Tools, so the
            // separate tabs are redundant. Also relabel Start → "เมนู" and
            // Formulas → "สูตร" so all visible tab labels are in Thai (the
            // crosshair button below uses Thai-friendly "Highlight"). Re-run
            // on every inject (initial + observer re-fires) in case Univer
            // re-renders the tab bar.
            const relabelTab = (tab, newLabel) => {
                // Walk text nodes so we don't blow away Univer's nested
                // span/icon wrappers; just rewrite the visible text.
                const walker = document.createTreeWalker(tab, NodeFilter.SHOW_TEXT);
                while (walker.nextNode()) {
                    const node = walker.currentNode;
                    if (node.nodeValue && node.nodeValue.trim()) {
                        node.nodeValue = newLabel;
                        return;
                    }
                }
            };
            for (const tab of tabBar.children) {
                if (!tab.getAttribute || tab.getAttribute('role') !== 'tab') continue;
                const label = tab.textContent.trim();
                if (label === 'Data' || label === 'Insert') {
                    tab.style.display = 'none';
                } else if (label === 'Start') {
                    relabelTab(tab, 'เมนู');
                } else if (label === 'Formulas') {
                    relabelTab(tab, 'สูตร');
                }
            }
            // Status indicator (saved / ● unsaved) is pinned to the LEFT
            // edge of the tab bar via absolute positioning so it visually
            // lines up above the "ข้อมูล" refresh button in the ribbon
            // row below — not centered with the tab buttons. We force the
            // tab bar to position: relative so the absolute anchor works
            // (Univer's default is static).
            if (getComputedStyle(tabBar).position === 'static') {
                tabBar.style.position = 'relative';
            }
            if (!tabBar.querySelector('#sheetDirtyIndicator')) {
                const ind = document.createElement('span');
                ind.id = 'sheetDirtyIndicator';
                ind.innerHTML = '<span class="status-label">saved</span>';
                ind.classList.toggle('dirty', !!sheetState.dirty);
                const labelEl = ind.querySelector('.status-label');
                if (labelEl) labelEl.textContent = sheetState.dirty ? 'unsaved' : 'saved';
                ind.title = sheetState.dirty
                    ? 'มีการแก้ไขที่ยังไม่ได้บันทึก'
                    : 'บันทึกแล้ว';
                tabBar.appendChild(ind);
            }
            if (tabBar.querySelector('.univer-crosshair-tab')) {
                setCrosshairButtonState();
                return;
            }
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'univer-crosshair-tab';
            btn.textContent = 'โฟกัส';
            btn.title = 'เปิด/ปิดโฟกัส (Crosshair Highlight)';
            btn.addEventListener('click', toggleCrosshair);
            tabBar.appendChild(btn);
            setCrosshairButtonState();
            if (_crosshairTabObserver) {
                try { _crosshairTabObserver.disconnect(); } catch {}
            }
            // Watch for two things:
            //  1) Univer re-rendering the tab bar (wipes our crosshair button)
            //     → re-inject the button
            //  2) Univer overwriting the Thai labels back to "Start" / "Formulas"
            //     when a different tab becomes active (React re-renders the
            //     text node) → re-apply Thai labels in place. characterData
            //     + subtree catches text-node mutations without us needing
            //     to re-create the whole button.
            _crosshairTabObserver = new MutationObserver(() => {
                if (!tabBar.querySelector('.univer-crosshair-tab')
                    || !tabBar.querySelector('#sheetDirtyIndicator')) {
                    setTimeout(injectCrosshairTab, 50);
                    return;
                }
                for (const tab of tabBar.children) {
                    if (!tab.getAttribute || tab.getAttribute('role') !== 'tab') continue;
                    const t = tab.textContent.trim();
                    if (t === 'Start') relabelTab(tab, 'เมนู');
                    else if (t === 'Formulas') relabelTab(tab, 'สูตร');
                    else if ((t === 'Data' || t === 'Insert') && tab.style.display !== 'none') {
                        tab.style.display = 'none';
                    }
                }
            });
            _crosshairTabObserver.observe(tabBar, {
                childList: true,
                subtree: true,
                characterData: true,
            });
        }

        // Inject app-specific file-ops (Refresh Data / Open / Save / Save
        // XLSX + dirty indicator) at the head of Univer's ribbon row, just
        // before the Undo button. Univer's ribbon doesn't have a File menu
        // and these are .se.json-specific operations that don't belong as
        // Univer commands, so we hand-inject them.
        // Idempotent + observed — re-injects if Univer wipes the row on
        // tab switch / workbook re-mount.
        let _fileOpsObserver = null;
        function injectFileOpsIntoUniverRibbon() {
            const mount = document.getElementById('univerMount');
            if (!mount) return;
            const tabHeader = Array.from(mount.querySelectorAll('header'))
                .find(h => h.querySelector('[role="tab"]'));
            if (!tabHeader) return;
            // header has 3 children: tab bar (0), ribbon row (1), invisible (2)
            const ribbonRow = tabHeader.children[1];
            if (!ribbonRow) return;
            // Insert as the first grid-child of the ribbon row + tag the
            // row so our CSS override (grid-template-columns: max-content
            // 1fr) kicks in. Putting the wrap inside the inner flex
            // container doesn't work — the inner is sized wider than its
            // grid cell and centered, pushing our buttons off-screen left.
            if (ribbonRow.querySelector(':scope > .se-file-ops')) return;
            ribbonRow.classList.add('se-ribbon-has-fileops');
            const wrap = document.createElement('div');
            wrap.className = 'se-file-ops';
            // Icon-driven buttons. Each SVG inherits color from CSS so we can
            // tint per-button (green refresh / blue save disk / green XLSX).
            // SVGs use currentColor + fill="none" stroke shape so the .se-
            // file-ops button[data-op=X] svg { color: ... } rules in CSS
            // drive their tint. Refresh keeps its Thai "ข้อมูล" label per
            // user request; the other three are icon-only with tooltips.
            const ICON_REFRESH =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><polyline points="21 3 21 8 16 8"/>' +
                '<path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><polyline points="3 21 3 16 8 16"/>' +
                '</svg>';
            const ICON_OPEN =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
                '<path d="M3 11h18"/>' +
                '</svg>';
            const ICON_SAVE =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>' +
                '<rect x="7" y="13" width="10" height="7"/>' +
                '<path d="M8 3v5h7V3"/>' +
                '</svg>';
            // Save-XLSX: document outline with a big "X" centered inside,
            // evoking the Microsoft Excel file icon while keeping a single-
            // colour stroke so the .se-file-ops button[data-op=savexlsx]
            // CSS tint (#16a34a) carries through cleanly.
            const ICON_XLSX =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
                '<polyline points="14 2 14 8 20 8"/>' +
                '<line x1="8.5" y1="13" x2="15.5" y2="20"/>' +
                '<line x1="15.5" y1="13" x2="8.5" y2="20"/>' +
                '</svg>';
            // Print: classic printer silhouette — top sheet, body, output
            // tray. Strokes use currentColor so CSS tints it slate-grey to
            // sit visually quieter than the coloured save icons.
            const ICON_PRINT =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<polyline points="6 9 6 2 18 2 18 9"/>' +
                '<path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>' +
                '<rect x="6" y="14" width="12" height="8"/>' +
                '</svg>';
            wrap.innerHTML =
                '<button type="button" data-op="refresh" title="โหลดข้อมูลปัจจุบัน (จาก lastRecords) เข้า workbook">' + ICON_REFRESH + '<span>ข้อมูล</span></button>' +
                '<button type="button" data-op="open" title="เปิดไฟล์ .se / .se.json หรือ Excel">' + ICON_OPEN + '</button>' +
                '<button type="button" data-op="save" title="บันทึก workbook เป็นไฟล์ .se.json (เก็บสูตรครบ)">' + ICON_SAVE + '</button>' +
                '<button type="button" data-op="savexlsx" title="บันทึกเป็น .xlsx (สูตรกลายเป็นค่า)">' + ICON_XLSX + '</button>' +
                '<button type="button" data-op="print" title="พิมพ์ (Ctrl+P)">' + ICON_PRINT + '</button>';
            wrap.querySelector('[data-op="refresh"]').addEventListener('click', newFromData);
            wrap.querySelector('[data-op="open"]').addEventListener('click', openSheetFile);
            wrap.querySelector('[data-op="save"]').addEventListener('click', saveSheetJson);
            wrap.querySelector('[data-op="savexlsx"]').addEventListener('click', saveSheetXlsx);
            wrap.querySelector('[data-op="print"]').addEventListener('click', printActiveView);
            // Insert as the first grid column of the ribbon row.
            ribbonRow.insertBefore(wrap, ribbonRow.firstChild);
            if (_fileOpsObserver) {
                try { _fileOpsObserver.disconnect(); } catch {}
            }
            _fileOpsObserver = new MutationObserver(() => {
                if (!ribbonRow.querySelector(':scope > .se-file-ops')) {
                    setTimeout(injectFileOpsIntoUniverRibbon, 50);
                }
            });
            _fileOpsObserver.observe(ribbonRow, { childList: true });
        }

        // The menu-manager-service identifier is a Symbol so a plain
        // inj.get('univer.menu-manager-service') throws — walk
        // resolvedDependencies and match by Symbol description instead.
        function findUniverMenuManager(injector, depth = 0) {
            if (!injector || depth > 5) return null;
            const dm = injector.resolvedDependencyCollection?.resolvedDependencies
                || injector.resolvedDependencyCollection;
            if (dm) {
                const items = dm instanceof Map
                    ? Array.from(dm.entries())
                    : Object.entries(dm);
                for (const [k, v] of items) {
                    if (String(k) === 'univer.menu-manager-service'
                        && Array.isArray(v) && v[0]?._menu) {
                        return v[0];
                    }
                }
            }
            for (const c of injector.children || []) {
                const found = findUniverMenuManager(c, depth + 1);
                if (found) return found;
            }
            return null;
        }

        // Move the Data tab's ribbon items (filter / sort / find / table-
        // selector / data-validation / conditional-formatting / text-to-
        // number) into the Start tab's ribbon row so users don't have to
        // switch tabs to reach them. Run once between createUniver and
        // createWorkbook — `IMenuManagerService.mergeMenu()` updates the
        // schema and emits menuChanged$ so the ribbon picks up the new
        // items on its first render.
        //
        // Note: items are NOT moved out of the Data tab — they're
        // *referenced* in both places (same menuItemFactory object). The
        // Data tab still shows them; the Start ribbon shows them too.
        function patchStartRibbonWithDataTools(univerInstance) {
            try {
                const inj = univerInstance?._injector;
                if (!inj) return;
                const mgr = findUniverMenuManager(inj);
                if (!mgr) return;
                const dataRibbon = mgr._menu?.ribbon?.['ribbon.data'];
                if (!dataRibbon) return;
                // Collect every leaf menu item from the Data tab's subgroups
                // (rules / organization / others). Each subgroup is a node
                // whose own children are the menu items keyed by their id.
                const collected = {};
                for (const groupKey of Object.keys(dataRibbon)) {
                    if (groupKey === 'order') continue;
                    const group = dataRibbon[groupKey];
                    for (const itemKey of Object.keys(group)) {
                        if (itemKey === 'order' || itemKey === 'menuItemFactory') continue;
                        collected[itemKey] = group[itemKey];
                    }
                }
                mgr.mergeMenu({ 'ribbon.start.others': collected });
            } catch (e) {
                console.warn('patchStartRibbonWithDataTools failed:', e);
            }
        }

        // Move Insert tab's image + hyperlink into the Start ribbon's
        // "history" group so they sit right after the undo / redo / format-
        // painter / clear cluster, before the font dropdown — a stable
        // visible position that doesn't compete for space with the densely-
        // packed format / layout / others groups (where high-order items
        // overflow into Univer's "More" menu and disappear).
        //
        // Skips the zen-editor hyperlink variant (only used in zen mode) and
        // doc.menu.table (Docs-specific, not a sheet feature). Shallow-copy
        // each item with an overridden `order` so the two icons land
        // adjacent at the end of the history group without mutating the
        // shared object that Univer's Insert tab still uses.
        function patchStartRibbonWithInsertTools(univerInstance) {
            try {
                const inj = univerInstance?._injector;
                if (!inj) return;
                const mgr = findUniverMenuManager(inj);
                if (!mgr) return;
                const insertRibbon = mgr._menu?.ribbon?.['ribbon.insert'];
                if (!insertRibbon) return;
                // Order matters in the output: image first, hyperlink second
                const wantedOrder = [
                    'sheet.menu.image',
                    'sheet.operation.insert-hyper-link-toolbar',
                ];
                const originalItems = {};
                for (const groupKey of Object.keys(insertRibbon)) {
                    if (groupKey === 'order') continue;
                    const group = insertRibbon[groupKey];
                    for (const itemKey of Object.keys(group)) {
                        if (itemKey === 'order' || itemKey === 'menuItemFactory') continue;
                        originalItems[itemKey] = group[itemKey];
                    }
                }
                const collected = {};
                wantedOrder.forEach((id, idx) => {
                    const src = originalItems[id];
                    if (!src) return;
                    collected[id] = Object.assign({}, src, { order: 100 + idx });
                });
                if (Object.keys(collected).length === 0) return;
                mgr.mergeMenu({ 'ribbon.start.history': collected });
            } catch (e) {
                console.warn('patchStartRibbonWithInsertTools failed:', e);
            }
        }

        function setSheetDirty(flag) {
            sheetState.dirty = flag;
            const ind = document.getElementById('sheetDirtyIndicator');
            if (!ind) return;
            ind.classList.toggle('dirty', !!flag);
            const labelEl = ind.querySelector('.status-label');
            if (labelEl) labelEl.textContent = flag ? 'unsaved' : 'saved';
            ind.title = flag ? 'มีการแก้ไขที่ยังไม่ได้บันทึก' : 'บันทึกแล้ว';
        }

        // Print the currently active view. Table + Pivot views have proper
        // @media print rules, but Sheet view (Univer canvas) is hidden when
        // printing because its canvas-based rendering doesn't print cleanly
        // — guard against accidental "blank page" prints by telling the
        // user to switch view (or export to .xlsx + print from Excel).
        function printActiveView() {
            const active = document.querySelector('input[name=view]:checked')?.value;
            if (active === 'spreadsheet') {
                alert(
                    'มุมมอง Sheet ไม่รองรับการพิมพ์โดยตรง\n\n' +
                    'กรุณาเปลี่ยนเป็นมุมมอง "ข้อมูล" หรือ "Pivot" ก่อนพิมพ์\n' +
                    'หรือกดปุ่ม "บันทึก .xlsx" แล้วเปิดใน Excel เพื่อพิมพ์'
                );
                return;
            }
            window.print();
        }

        function setSheetStatus(msg) {
            const el = document.getElementById('sheetStatus');
            if (el) el.textContent = msg || '';
        }

        function setSheetOverlay(visible, text) {
            const ov = document.getElementById('sheetLoadingOverlay');
            const tx = ov && ov.querySelector('.sheet-loading-text');
            if (tx && text) tx.textContent = text;
            if (ov) ov.classList.toggle('visible', !!visible);
        }

        // Reset the empty-state message back to its initial copy. Called
        // before showing the empty state so previous error / context-specific
        // messages don't linger across mount attempts.
        const SHEET_EMPTY_DEFAULT_HTML =
            'ยังไม่มีข้อมูล — กรุณา Fetch ก่อน แล้วกลับมาที่นี่<br>' +
            'หรือโหลด workbook ที่บันทึกไว้:' +
            '<br><button type="button" class="sheet-empty-open-btn" ' +
            'onclick="openSheetFile()">📂 Open ไฟล์</button>';

        function setSheetEmptyText(html) {
            const el = document.querySelector('#sheetEmptyMessage > .sheet-empty-text');
            if (el) el.innerHTML = html;
        }

        function setSheetEmptyVisible(visible) {
            const el = document.getElementById('sheetEmptyMessage');
            if (el) el.classList.toggle('hidden', !visible);
            if (visible) setSheetEmptyText(SHEET_EMPTY_DEFAULT_HTML);
        }

        function _loadUniverScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => resolve();
                s.onerror = () => reject(new Error('Failed to load script: ' + src));
                document.head.appendChild(s);
            });
        }
        function _loadUniverCss(src) {
            if (document.querySelector(`link[href="${src}"]`)) return;
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = src;
            document.head.appendChild(link);
        }

        // ===== SheetJS lazy-loader =====
        // Used by Export Excel (table view), Save as XLSX (sheet view),
        // and Open .xlsx in the sheet view. ~1.4 MB minified — too big
        // to ship on every page load when most users never export.
        const SHEETJS_URL = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
        const sheetJsState = { loaded: false, loadingPromise: null };

        function loadSheetJsAssets() {
            if (sheetJsState.loaded) return Promise.resolve();
            if (sheetJsState.loadingPromise) return sheetJsState.loadingPromise;
            sheetJsState.loadingPromise = _loadUniverScript(SHEETJS_URL).then(() => {
                if (typeof XLSX === 'undefined') {
                    throw new Error('SheetJS global (XLSX) missing after script load');
                }
                sheetJsState.loaded = true;
            });
            return sheetJsState.loadingPromise.catch(err => {
                sheetJsState.loadingPromise = null;
                throw err;
            });
        }

        // ===== JSZip lazy-loader =====
        // Used by Open .xlsx to extract Excel Tables (xl/tables/*.xml) that
        // SheetJS Community Edition doesn't expose through its parsed
        // workbook object. ~100 KB minified — only fetched on first .xlsx
        // open, not on every page load.
        const JSZIP_URL = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        const jszipState = { loaded: false, loadingPromise: null };

        function loadJSZipAssets() {
            if (jszipState.loaded) return Promise.resolve();
            if (jszipState.loadingPromise) return jszipState.loadingPromise;
            jszipState.loadingPromise = _loadUniverScript(JSZIP_URL).then(() => {
                if (typeof JSZip === 'undefined') {
                    throw new Error('JSZip global missing after script load');
                }
                jszipState.loaded = true;
            });
            return jszipState.loadingPromise.catch(err => {
                jszipState.loadingPromise = null;
                throw err;
            });
        }

        // ===== Pivot stack lazy-loader =====
        // jQuery + jQuery UI + PivotTable.js + Plotly are only needed when
        // the user actually opens the Pivot tab. Loading them on first
        // tab entry (instead of at page load) saves ~1MB gzip — most of
        // which is Plotly.
        const PIVOT_URLS = {
            jqueryUiCss:     'https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.css',
            pivotCss:        'https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.css',
            jquery:          'https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js',
            jqueryUi:        'https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.js',
            pivot:           'https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.js',
            plotly:          'https://cdn.jsdelivr.net/npm/plotly.js-dist-min/plotly.min.js',
            plotlyRenderers: 'https://cdn.jsdelivr.net/npm/pivottable/dist/plotly_renderers.min.js',
        };
        const pivotAssetState = { loaded: false, loadingPromise: null };

        function loadPivotAssets() {
            if (pivotAssetState.loaded) return Promise.resolve();
            if (pivotAssetState.loadingPromise) return pivotAssetState.loadingPromise;

            pivotAssetState.loadingPromise = (async () => {
                // CSS in parallel — non-blocking.
                _loadUniverCss(PIVOT_URLS.jqueryUiCss);
                _loadUniverCss(PIVOT_URLS.pivotCss);
                // Order matters: jQuery must define $/jQuery before
                // jQuery UI and PivotTable register against it. Plotly
                // is independent of jQuery but the plotly_renderers
                // adapter expects both Plotly and PivotTable globals.
                await _loadUniverScript(PIVOT_URLS.jquery);
                await _loadUniverScript(PIVOT_URLS.jqueryUi);
                await _loadUniverScript(PIVOT_URLS.pivot);
                await _loadUniverScript(PIVOT_URLS.plotly);
                await _loadUniverScript(PIVOT_URLS.plotlyRenderers);
                if (typeof window.$ === 'undefined' ||
                    typeof window.$.pivotUtilities === 'undefined') {
                    throw new Error('Pivot globals not found after script load');
                }
                pivotAssetState.loaded = true;
            })();

            return pivotAssetState.loadingPromise.catch(err => {
                pivotAssetState.loadingPromise = null;
                throw err;
            });
        }

        function loadUniverAssets() {
            if (sheetState.loaded) return Promise.resolve();
            if (sheetState.loadingPromise) return sheetState.loadingPromise;

            sheetState.loadingPromise = (async () => {
                // CSS in parallel — non-blocking for layout
                [UNIVER_URLS.cssCore, UNIVER_URLS.cssFilter, UNIVER_URLS.cssSort,
                 UNIVER_URLS.cssFindReplace, UNIVER_URLS.cssCf,
                 UNIVER_URLS.cssDataValidation, UNIVER_URLS.cssDrawing,
                 UNIVER_URLS.cssHyperLink,
                 UNIVER_URLS.cssNote, UNIVER_URLS.cssTable,
                 UNIVER_URLS.cssCrosshair].forEach(_loadUniverCss);

                // Base deps must load before Univer UMDs (sequential to be safe)
                await _loadUniverScript(UNIVER_URLS.react);
                await _loadUniverScript(UNIVER_URLS.reactDom);
                await _loadUniverScript(UNIVER_URLS.rxjs);

                // Univer core + presets (presets first — defines UniverPresets/UniverCore)
                await _loadUniverScript(UNIVER_URLS.presets);
                // Core sheet preset + its locale
                await _loadUniverScript(UNIVER_URLS.core);
                await _loadUniverScript(UNIVER_URLS.coreLocale);
                // Optional feature presets — load best-effort; if any fail to
                // load we still proceed with whatever's available. The 2nd
                // tuple entry is the locale URL; `null` means the package
                // has no locale file (true for the crosshair-highlight
                // plugin — its labels come from base sheets-ui).
                const optional = [
                    [UNIVER_URLS.filter,         UNIVER_URLS.filterLocale],
                    [UNIVER_URLS.sort,           UNIVER_URLS.sortLocale],
                    [UNIVER_URLS.findReplace,    UNIVER_URLS.findReplaceLocale],
                    [UNIVER_URLS.cf,             UNIVER_URLS.cfLocale],
                    [UNIVER_URLS.dataValidation, UNIVER_URLS.dataValidationLocale],
                    [UNIVER_URLS.drawing,        UNIVER_URLS.drawingLocale],
                    [UNIVER_URLS.hyperLink,      UNIVER_URLS.hyperLinkLocale],
                    [UNIVER_URLS.note,           UNIVER_URLS.noteLocale],
                    [UNIVER_URLS.table,          UNIVER_URLS.tableLocale],
                    [UNIVER_URLS.crosshair,      null],
                ];
                for (const [js, loc] of optional) {
                    try {
                        await _loadUniverScript(js);
                        if (loc) await _loadUniverScript(loc);
                    } catch (e) {
                        console.warn('Optional Univer preset failed to load:', js, e);
                    }
                }

                if (typeof UniverPresets === 'undefined' ||
                    typeof UniverCore === 'undefined' ||
                    typeof UniverPresetSheetsCore === 'undefined') {
                    throw new Error('Univer globals not found after script load');
                }
                sheetState.loaded = true;
            })();

            return sheetState.loadingPromise.catch(err => {
                sheetState.loadingPromise = null;
                throw err;
            });
        }

        // Cell value type tags used by Univer's IWorkbookData.cellData:
        //   1 = STRING, 2 = NUMBER. (Others exist for booleans/forces, not used here.)
        const UNIVER_T_STRING = 1;
        const UNIVER_T_NUMBER = 2;

        // Rows scanned to infer a column's numeric/string type. Big datasets
        // would otherwise pay O(rows) per numeric-looking column just to
        // confirm — sampling 200 rows is enough for the iSurvey schema
        // (numeric columns are uniformly numeric in practice; text columns
        // are pinned via SHEET_TEXT_KEYS). The cell loop has a per-cell
        // fallback for the rare 'numeric-by-sample but mixed' edge case.
        const TYPE_INFER_SAMPLE = 200;
        // Rows per chunk when building cellData. The overlay can repaint
        // and the browser stays responsive between chunks; 5k is small
        // enough for sub-100ms work per chunk on typical hardware while
        // keeping total yield count low (50k rows = 10 yields).
        const WORKBOOK_CHUNK = 5000;

        async function recordsToUniverWorkbook(records, columns, name, onProgress) {
            // Decide per-column type up front so a column is uniform — Univer's
            // built-in filter UI groups unique values by raw value, and mixed
            // types in one column can produce odd ordering. Sampled to
            // TYPE_INFER_SAMPLE non-blank rows; text columns (claim_no etc.)
            // are always string.
            const colTypes = columns.map((col) => {
                if (SHEET_TEXT_KEYS.has(col.key)) return 's';
                let allNumeric = true;
                let sawValue = false;
                const limit = Math.min(records.length, TYPE_INFER_SAMPLE);
                for (let i = 0; i < limit; i++) {
                    const raw = records[i][col.key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (typeof raw === 'string' && raw.trim() === '') continue;
                    sawValue = true;
                    const num = Number(raw);
                    if (!Number.isFinite(num)) { allNumeric = false; break; }
                }
                return (sawValue && allNumeric) ? 'n' : 's';
            });

            // cellData shape: { [rowIdx]: { [colIdx]: { v, t, s? } } }
            // Sparse — only emit non-empty cells.
            const cellData = { 0: {} };
            // Header row (row 0)
            for (let c = 0; c < columns.length; c++) {
                cellData[0][c] = {
                    v: columns[c].label,
                    t: UNIVER_T_STRING,
                    s: { bl: 1, bg: { rgb: '#f1f5f9' }, cl: { rgb: '#1e293b' } },
                };
            }
            // Data rows — chunked + async-yielding so the overlay text/
            // spinner repaints between chunks. Inner column loop is a
            // tight for() (not forEach) because it runs records.length ×
            // columns.length times; closures per cell add up to tens of
            // ms at 50k+ rows.
            const total = records.length;
            const nCols = columns.length;
            for (let i = 0; i < total; i++) {
                const rec = records[i];
                const r = i + 1;
                const row = {};
                let touched = false;
                for (let c = 0; c < nCols; c++) {
                    const raw = rec[columns[c].key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (colTypes[c] === 'n') {
                        const num = Number(raw);
                        if (Number.isFinite(num)) {
                            row[c] = { v: num, t: UNIVER_T_NUMBER };
                        } else {
                            // Sample said numeric, this value isn't —
                            // fall back to string for THIS cell so we
                            // don't write a NaN-valued numeric cell.
                            row[c] = { v: String(raw), t: UNIVER_T_STRING };
                        }
                    } else {
                        row[c] = { v: String(raw), t: UNIVER_T_STRING };
                    }
                    touched = true;
                }
                if (touched) cellData[r] = row;
                if ((i + 1) % WORKBOOK_CHUNK === 0 && i + 1 < total) {
                    if (onProgress) onProgress(i + 1, total);
                    // setTimeout(0) gives the browser one frame to repaint
                    // the overlay text before resuming.
                    await new Promise(res => setTimeout(res, 0));
                }
            }
            if (onProgress) onProgress(total, total);

            sheetState.recordCount = records.length;
            sheetState.colCount = columns.length;

            const sheetId = 'sheet-' + Date.now();
            return {
                id: 'wb-' + Date.now(),
                name: name || 'SE Report Workbook',
                appVersion: '0.10.0',
                locale: 'enUS',
                sheetOrder: [sheetId],
                sheets: {
                    [sheetId]: {
                        id: sheetId,
                        name: 'Sheet1',
                        rowCount: Math.max(records.length + 50, 200),
                        columnCount: Math.max(columns.length + 5, 26),
                        cellData,
                        mergeData: [],
                        freeze: { startRow: 1, startColumn: 0, ySplit: 1, xSplit: 0 },
                        defaultColumnWidth: 110,
                        defaultRowHeight: 24,
                    },
                },
                styles: {},
                resources: [],
            };
        }

        function mountUniver(workbookData, label) {
            const host = document.getElementById('univerHost');
            setSheetEmptyVisible(false);

            // Dispose previous Univer instance, if any. Easier than swapping
            // workbook in-place since createWorkbook in Univer can leave the
            // prior unit around.
            if (sheetState.univer) {
                try { sheetState.univer.dispose(); } catch (e) { console.warn(e); }
                sheetState.univer = null;
                sheetState.univerAPI = null;
                sheetState.mounted = false;
            }
            // Clear any leftover mount children (preserve overlay/empty msg)
            Array.from(host.childNodes).forEach(node => {
                if (node.id !== 'sheetLoadingOverlay' && node.id !== 'sheetEmptyMessage') {
                    host.removeChild(node);
                }
            });
            const mountDiv = document.createElement('div');
            mountDiv.id = 'univerMount';
            host.appendChild(mountDiv);

            const { createUniver } = UniverPresets;
            const { LocaleType, mergeLocales } = UniverCore;

            const presets = [
                UniverPresetSheetsCore.UniverSheetsCorePreset({ container: 'univerMount' }),
            ];
            const localeBits = [
                typeof UniverPresetSheetsCoreEnUS !== 'undefined' ? UniverPresetSheetsCoreEnUS : {},
            ];

            // Add optional presets that were loaded successfully. Naming
            // follows Univer's convention: package @univerjs/preset-sheets-X
            // exposes window.UniverPresetSheetsX and UniverPresetSheetsXEnUS.
            const opt = [
                ['UniverPresetSheetsFilter',              'UniverSheetsFilterPreset',              'UniverPresetSheetsFilterEnUS'],
                ['UniverPresetSheetsSort',                'UniverSheetsSortPreset',                'UniverPresetSheetsSortEnUS'],
                ['UniverPresetSheetsFindReplace',         'UniverSheetsFindReplacePreset',         'UniverPresetSheetsFindReplaceEnUS'],
                ['UniverPresetSheetsConditionalFormatting','UniverSheetsConditionalFormattingPreset','UniverPresetSheetsConditionalFormattingEnUS'],
                ['UniverPresetSheetsDataValidation',       'UniverSheetsDataValidationPreset',       'UniverPresetSheetsDataValidationEnUS'],
                ['UniverPresetSheetsDrawing',              'UniverSheetsDrawingPreset',              'UniverPresetSheetsDrawingEnUS'],
                ['UniverPresetSheetsHyperLink',            'UniverSheetsHyperLinkPreset',            'UniverPresetSheetsHyperLinkEnUS'],
                ['UniverPresetSheetsNote',                 'UniverSheetsNotePreset',                 'UniverPresetSheetsNoteEnUS'],
                ['UniverPresetSheetsTable',                'UniverSheetsTablePreset',                'UniverPresetSheetsTableEnUS'],
            ];
            for (const [ns, preset, locale] of opt) {
                const nsObj = window[ns];
                if (nsObj && typeof nsObj[preset] === 'function') {
                    try { presets.push(nsObj[preset]()); } catch (e) {
                        console.warn(`Univer preset ${preset} init failed`, e);
                    }
                }
                if (window[locale]) localeBits.push(window[locale]);
            }

            const { univer, univerAPI } = createUniver({
                locale: LocaleType.EN_US,
                locales: { [LocaleType.EN_US]: mergeLocales.apply(null, localeBits) },
                presets,
            });

            // crosshair-highlight is a lower-level plugin (no preset bundle).
            // Register it AFTER createUniver but BEFORE createWorkbook so the
            // plugin gets initialised against the same DI container that the
            // workbook will hook into. Wrapped in try/catch since the script
            // load is best-effort (no-op if the optional CDN fetch failed).
            try {
                const chNs = window.UniverSheetsCrosshairHighlight;
                if (chNs && chNs.UniverSheetsCrosshairHighlightPlugin) {
                    univer.registerPlugin(chNs.UniverSheetsCrosshairHighlightPlugin);
                }
            } catch (e) {
                console.warn('crosshair-highlight registration failed:', e);
            }

            univerAPI.createWorkbook(workbookData);

            // Copy Data tab's ribbon items into the Start tab's ribbon so
            // users get filter / sort / find / table / dv / cf / text-to-
            // number without having to switch tabs. Items get registered
            // by their plugins AFTER createWorkbook — and some preset
            // bundles (filter / sort / find-replace / data-validation)
            // register asynchronously, so a small delay lets the schema
            // settle before we copy from it. mergeMenu emits menuChanged$
            // which the ribbon subscribes to and re-renders with our
            // additions, so timing-after-render is fine.
            setTimeout(() => {
                patchStartRibbonWithDataTools(univer);
                patchStartRibbonWithInsertTools(univer);
            }, 500);

            sheetState.univer = univer;
            sheetState.univerAPI = univerAPI;
            sheetState.currentData = workbookData;
            sheetState.sourceLabel = label || '';
            sheetState.mounted = true;
            // Crosshair plugin starts off after a fresh mount — toggle state
            // doesn't carry over because we create a brand-new Univer instance.
            sheetState.crosshairOn = false;
            setSheetDirty(false);
            setSheetStatus(label || '');
            // Inject the Crosshair toggle into Univer's tab bar (next to
            // Data) + the file-ops button group at the head of the ribbon
            // row. Univer renders the tab bar / ribbon asynchronously after
            // createWorkbook so wait a tick for the DOM to settle.
            setTimeout(() => {
                injectCrosshairTab();
                injectFileOpsIntoUniverRibbon();
            }, 150);

            // Attach a dirty-tracking listener. Univer's command system fires
            // for every mutation (type === 2 in the CommandType enum). We
            // suppress dirty marking for the first 500ms because the initial
            // createWorkbook itself dispatches commands.
            const mountedAt = Date.now();
            try {
                if (typeof univerAPI.onCommandExecuted === 'function') {
                    univerAPI.onCommandExecuted((cmd) => {
                        if (Date.now() - mountedAt < 500) return;
                        // type === 2 is "Mutation" in Univer's CommandType enum
                        if (cmd && (cmd.type === 2 || cmd.type === 'mutation')) {
                            if (!sheetState.dirty) setSheetDirty(true);
                        }
                    });
                }
            } catch (e) {
                console.warn('Failed to attach Univer change listener:', e);
            }

            // Intercept Sort Ascending / Descending so we sort the whole data
            // region (rows 1..N × all cols) keyed off the user's selected
            // column, instead of letting Univer sort only the selected range
            // (which leaves the other columns frozen and breaks row order).
            // Throwing from the pre-hook cancels the original command in
            // Univer 0.22.x; if a future version changes that, the fallback
            // sort still runs and overwrites whatever the original did.
            try {
                if (typeof univerAPI.onBeforeCommandExecute === 'function') {
                    univerAPI.onBeforeCommandExecute((cmd) => {
                        if (!cmd || !cmd.id) return;
                        if (sheetState._sortGuard) return; // ignore mutations our own sort dispatches
                        const id = cmd.id;
                        const asc = (id === 'sheet.command.sort-range-asc'
                            || id === 'sheet.command.sort-range-asc-ext');
                        const desc = (id === 'sheet.command.sort-range-desc'
                            || id === 'sheet.command.sort-range-desc-ext');
                        if (!asc && !desc) return;
                        sheetState._sortGuard = true;
                        Promise.resolve()
                            .then(() => _runFullSheetSort(asc))
                            .catch(e => console.error('Full-data sort failed:', e))
                            .finally(() => { sheetState._sortGuard = false; });
                        throw new Error('SE_SORT_INTERCEPTED'); // cancel Univer's partial sort
                    });
                }
            } catch (e) {
                console.warn('Failed to attach sort interceptor:', e);
            }
        }

        async function enterSpreadsheetTab() {
            if (sheetState.mounted) return; // already populated; preserve in-memory state
