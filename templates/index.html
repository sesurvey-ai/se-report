            }
            const colEls = colgroup.querySelectorAll('col');

            // Restore saved widths (col 3 = renderer area, stays auto).
            // Clamp to measured minimums in case localStorage holds an older
            // narrower value from before this floor was introduced.
            const saved = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
            const savedCol1 = parseInt(saved.col1, 10) || 260;
            const savedCol2 = parseInt(saved.col2, 10) || 200;
            const unusedCell = tbl.querySelector('td.pvtUnused');
            const rowsCell = tbl.querySelector('td.pvtRows');

            // Apply persisted collapse state on the Unused column. Collapsed
            // width is fixed at 28px regardless of measured min, so the user
            // can free up horizontal space for the renderer area.
            const collapsedPref = localStorage.getItem('se_pivot_unused_collapsed') === 'true';
            if (unusedCell) unusedCell.classList.toggle('pvt-unused-collapsed', collapsedPref);
            colEls[0].style.width = collapsedPref
                ? '28px'
                : Math.max(tbl._minCol1, savedCol1) + 'px';
            colEls[1].style.width = Math.max(tbl._minCol2, savedCol2) + 'px';

            if (tbl._resizersAdded) return;
            tbl._resizersAdded = true;

            // Insert a collapse / expand toggle in the top-right of pvtUnused.
            // Clicking it persists the state to localStorage and re-applies
            // col 1 width without touching the saved drag-resize value.
            if (unusedCell && !unusedCell.querySelector(':scope > .pvt-collapse-btn')) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pvt-collapse-btn';
                btn.title = 'ซ่อน/แสดงรายการ field';
                btn.textContent = collapsedPref ? '»' : '«';
                unusedCell.appendChild(btn);
                btn.addEventListener('click', ev => {
                    ev.stopPropagation();
                    const nowCollapsed = !unusedCell.classList.contains('pvt-unused-collapsed');
                    localStorage.setItem('se_pivot_unused_collapsed', String(nowCollapsed));
                    unusedCell.classList.toggle('pvt-unused-collapsed', nowCollapsed);
                    btn.textContent = nowCollapsed ? '»' : '«';
                    if (nowCollapsed) {
                        colEls[0].style.width = '28px';
                    } else {
                        const s = JSON.parse(localStorage.getItem('se_pivot_widths') || '{}');
                        const w = Math.max(tbl._minCol1, parseInt(s.col1, 10) || 260);
                        colEls[0].style.width = w + 'px';
                    }
                    updatePivotHScroll();
                });
            }

            function makeHandle(cell, colIdx) {
                if (!cell) return;
                if (cell.querySelector(':scope > .pvt-resizer')) return;
                const handle = document.createElement('div');
                handle.className = 'pvt-resizer';
                cell.appendChild(handle);
                handle.addEventListener('mousedown', e => {
                    const startX = e.clientX;
                    const startW = parseInt(colEls[colIdx].style.width, 10)
                        || cell.getBoundingClientRect().width;
                    const minW = colIdx === 0 ? tbl._minCol1 : tbl._minCol2;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    const onMove = ev => {
                        const w = Math.max(minW, Math.min(800, startW + ev.clientX - startX));
                        colEls[colIdx].style.width = w + 'px';
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('dragging');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        localStorage.setItem('se_pivot_widths', JSON.stringify({
                            col1: colEls[0].style.width,
                            col2: colEls[1].style.width,
                        }));
                        updatePivotHScroll();
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    e.preventDefault();
                });
            }

            makeHandle(unusedCell, 0);
            makeHandle(rowsCell, 1);
        }

        function buildPivot() {
            if (!lastRecords || lastRecords.length === 0) return;
            const el = document.getElementById('pivotOutput');
            try {
                const rt = document.querySelector('input[name=report_type]:checked').value;
                const cols = COLUMN_MAP[rt] || [];
                const validLabels = new Set(cols.map(([, label]) => label));

                const data = lastRecords.map(record => {
                    const row = {};
                    cols.forEach(([key, label]) => { row[label] = record[key] ?? ''; });
                    return row;
                });

                // Restore prior config saved per report type. Field selections
                // (rows/cols/vals) are filtered against the current column set
                // so a config from one report type doesn't break the other.
                const storageKey = 'se_pivot_config_' + rt;
                let savedCfg = {};
                try { savedCfg = JSON.parse(localStorage.getItem(storageKey) || '{}'); }
                catch (_) { savedCfg = {}; }
                const filterLabels = arr => Array.isArray(arr)
                    ? arr.filter(l => validLabels.has(l)) : [];
                const filterInclusions = obj => {
                    if (!obj || typeof obj !== 'object') return {};
                    const out = {};
                    Object.keys(obj).forEach(k => {
                        if (validLabels.has(k)) out[k] = obj[k];
                    });
                    return out;
                };

                $(el).empty();
                const rowFields = filterLabels(savedCfg.rows);
                const colFields = filterLabels(savedCfg.cols);

                $(el).pivotUI(data, {
                    rows: rowFields,
                    cols: colFields,
                    vals: filterLabels(savedCfg.vals),
                    aggregatorName: savedCfg.aggregatorName || 'Count',
                    rendererName: savedCfg.rendererName || 'Table',
                    inclusions: filterInclusions(savedCfg.inclusions),
                    exclusions: filterInclusions(savedCfg.exclusions),
                    // Default is 500; raise so fields with many unique values
                    // (e.g. claim numbers ~600+) still render the checklist.
                    menuLimit: 20000,
                    // Natural sort so numeric-looking strings (claim no.) order
                    // correctly instead of lexicographically.
                    sorters: function () { return $.pivotUtilities.naturalSort; },
                    rowOrder: 'key_a_to_z',
                    colOrder: 'key_a_to_z',
                    renderers: $.extend(
                        $.pivotUtilities.renderers,
                        $.pivotUtilities.plotly_renderers
                    ),
                    onRefresh: function (cfg) {
                        // Strip non-serializable bits (functions, derived data
                        // sources) before persisting.
                        const persistable = {
                            rows: cfg.rows || [],
                            cols: cfg.cols || [],
                            vals: cfg.vals || [],
                            aggregatorName: cfg.aggregatorName,
                            rendererName: cfg.rendererName,
                            inclusions: cfg.inclusions || {},
                            exclusions: cfg.exclusions || {},
                        };
                        try {
                            localStorage.setItem(storageKey, JSON.stringify(persistable));
                        } catch (_) { /* quota or private mode — ignore */ }
                    },
                }, true);
                attachPivotResizers();
            } catch (e) {
                el.textContent = 'An error occurred rendering the PivotTable UI.';
                console.error('buildPivot error:', e);
            }
        }

        function countBy(records, key, top) {
            const counts = {};

                const label = (v == null || String(v).trim() === '') ? '(ว่าง)' : String(v);
                counts[label] = (counts[label] || 0) + 1;
            });
            let entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (top) entries = entries.slice(0, top);
            return { labels: entries.map(e => e[0]), data: entries.map(e => e[1]) };
        }

        function avgTravelTime(records) {
            let total = 0, count = 0;
            records.forEach(r => {
                const t = r.travel_time; if (!t) return;
                const p = String(t).split(':');
                if (p.length === 2) { total += parseInt(p[0]) * 60 + parseInt(p[1]); count++; }
            });
            if (!count) return '-';
            const avg = Math.round(total / count), h = Math.floor(avg / 60), m = avg % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function loadFortuneSheetAssets() {
            if (sheetState.loaded) return Promise.resolve();
            if (sheetState.loadingPromise) return sheetState.loadingPromise;

            sheetState.loadingPromise = (async () => {
                // Inject CSS once
                if (!document.querySelector('link[data-fortune-sheet]')) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = FS_URLS.css;
                    link.dataset.fortuneSheet = '1';
                    document.head.appendChild(link);
                }
                // Dynamic ES module imports (esm.sh bundles deps for browser)
                const [reactMod, reactDomMod, fsMod] = await Promise.all([
                    import(FS_URLS.react),
                    import(FS_URLS.reactDom),
                    import(FS_URLS.sheet),
                ]);
                sheetState.React = reactMod.default || reactMod;
                sheetState.ReactDOM = reactDomMod.default || reactDomMod;
                sheetState.Workbook = fsMod.Workbook || (fsMod.default && fsMod.default.Workbook);
                if (!sheetState.Workbook) {
                    throw new Error('FortuneSheet Workbook export not found');
                }
                sheetState.loaded = true;
            })();

            return sheetState.loadingPromise.catch(err => {
                sheetState.loadingPromise = null;
                throw err;
            });
        }

        function recordsToCelldata(records, columns) {
            // FortuneSheet celldata shape: [{r, c, v: {v, m, ct: {fa, t}}}]
            // Match the Excel export's text-format behavior for claim_no etc.
            const cells = [];
            // Header row
            columns.forEach((col, c) => {
                cells.push({
                    r: 0, c,
                    v: {
                        v: col.label, m: col.label,
                        ct: { fa: 'General', t: 'g' },
                        bl: 1,
                        bg: '#f1f5f9',
                        fc: '#1e293b',
                    },
                });
            });
            // First pass — pick one type per column so every cell in a column
            // is uniform. FortuneSheet's filter dropdown groups unique values
            // by (value, type); when the same column mixes numbers (t:'n')
            // and strings (t:'s'), Sort interactions can leave the unique-
            // value computation seeing a partitioned set and rendering an
            // empty values list. A column is numeric only if *every* non-
            // blank record parses as a finite number. Text columns
            // (claim_no etc.) are always string.
            const colTypes = columns.map((col) => {
                if (SHEET_TEXT_KEYS.has(col.key)) return 's';
                let allNumeric = true;
                let sawValue = false;
                for (let i = 0; i < records.length; i++) {
                    const raw = records[i][col.key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    sawValue = true;
                    if (typeof raw === 'string' && raw.trim() === '') continue;
                    const num = !isNaN(raw) ? Number(raw) : NaN;
                    if (!Number.isFinite(num)) { allNumeric = false; break; }
                }
                return (sawValue && allNumeric) ? 'n' : 's';
            });
            // Data rows
            for (let i = 0; i < records.length; i++) {
                const rec = records[i];
                const r = i + 1;
                columns.forEach((col, c) => {
                    const raw = rec[col.key];
                    if (raw === null || raw === undefined || raw === '') return;
                    const str = String(raw);
                    if (colTypes[c] === 'n') {
                        cells.push({ r, c, v: { v: Number(raw), m: str, ct: { fa: 'General', t: 'n' } } });
                    } else {
                        const fa = SHEET_TEXT_KEYS.has(col.key) ? '@' : 'General';
                        cells.push({ r, c, v: { v: str, m: str, ct: { fa, t: 's' } } });
                    }
                });
            }
            return cells;
        }

        function buildWorkbookData(records, columns) {
            const celldata = recordsToCelldata(records, columns);
            const lastRow = records.length; // header is row 0, data is rows 1..records.length
            const lastCol = columns.length - 1;
            return [{
                name: 'Sheet1',
                celldata,
                order: 0,
                row: Math.max(records.length + 5, 100),
                column: Math.max(columns.length + 3, 26),
                config: {},
                status: 1,
                // Pre-arm the filter range. Two reasons:
                //   1. Filter arrows show on every header immediately — user
                //      doesn't have to click "Create filter" in the toolbar
                //      and risk FortuneSheet's auto-detect picking a truncated
                //      range when sparse columns (many blank cells) trip its
                //      "stop at the first blank row" heuristic.
                //   2. With the range pinned to the full data extent, the
                //      filter dropdown's getFilterColumnValues loop always
                //      iterates every data row — so a multi-column filter+sort
                //      sequence can't leave the values list empty due to a
                //      mis-sized range. (Cross-column intersections that
                //      legitimately hide every visible row still show as blank,
                //      which is the correct behavior.)
                filter_select: {
                    row: [0, lastRow],
                    column: [0, lastCol],
                },
                filter: null,
            }];
        }

        function mountFortuneSheet(workbookData, label) {
            const host = document.getElementById('fortuneSheetHost');
            setSheetEmptyVisible(false);

            if (sheetState.root) {
                try { sheetState.root.unmount(); } catch {}
                sheetState.root = null;
                sheetState.mounted = false;
            }

            // Clear any leftover children (other than persistent overlay/empty msg)
            Array.from(host.childNodes).forEach(node => {
                if (node.id !== 'sheetLoadingOverlay' && node.id !== 'sheetEmptyMessage') {
                    host.removeChild(node);
                }
            });
            const mountDiv = document.createElement('div');
            mountDiv.style.width = '100%';
            mountDiv.style.height = '100%';
            host.appendChild(mountDiv);

            const root = sheetState.ReactDOM.createRoot(mountDiv);
            // FortuneSheet may dispatch onChange during initial render/setup.
            // Suppress dirty marking for the first 500ms to avoid spurious
            // "unsaved" indicator on a freshly-mounted workbook.
            const mountedAt = Date.now();
            const handleChange = (data) => {
                sheetState.currentData = data;
                if (Date.now() - mountedAt < 500) return;
                if (sheetState.mounted) setSheetDirty(true);
            };
            const el = sheetState.React.createElement(sheetState.Workbook, {
                data: workbookData,
                onChange: handleChange,
            });
            root.render(el);

            sheetState.root = root;
            sheetState.currentData = workbookData;
            sheetState.sourceLabel = label || '';
            sheetState.mounted = true;
            setSheetDirty(false);
            setSheetStatus(label || '');
        }

        async function enterSpreadsheetTab() {
            if (sheetState.mounted) return; // already populated; preserve in-memory state

            // No data yet: show empty message + still preload assets so Open works
            if (!lastRecords || lastRecords.length === 0) {
                setSheetEmptyVisible(true);
                setSheetStatus('');
                try {
                    setSheetOverlay(true, 'กำลังโหลด FortuneSheet (เตรียมไว้สำหรับ Open)...');
                    await loadFortuneSheetAssets();
                } catch (e) {
                    console.error('FortuneSheet preload failed:', e);
                    setSheetStatus('โหลด FortuneSheet ไม่สำเร็จ — เช็คเน็ต/esm.sh');
                } finally {
                    setSheetOverlay(false);
                }
                return;
            }

            const selected = getSelectedColumns();
            if (selected.length === 0) {
                setSheetEmptyVisible(true);
                setSheetEmptyText('กรุณาเลือกอย่างน้อย 1 คอลัมน์ใน sidebar Columns');
                return;
            }

            const filtered = applyColumnFilters(lastRecords);

            if (filtered.length > SHEET_PERF_THRESHOLD) {
                const ok = confirm(
                    `Dataset มี ${filtered.length.toLocaleString()} rows — ` +
                    `FortuneSheet ไม่ได้ออกแบบมาสำหรับ row จำนวนมาก ` +
                    `อาจใช้เวลาโหลดและทำงานช้า\n\nต้องการดำเนินการต่อ?`
                );
                if (!ok) {
                    document.getElementById('v_table').checked = true;
                    switchView('table');
                    return;
                }
            }

            setSheetOverlay(true, 'กำลังโหลด FortuneSheet...');
            try {
                await loadFortuneSheetAssets();
                setSheetOverlay(true, `กำลังสร้าง workbook (${filtered.length.toLocaleString()} rows × ${selected.length} cols)...`);
                // Yield so the spinner paints before the synchronous mount work
                await new Promise(r => setTimeout(r, 30));
                mountFortuneSheet(
                    buildWorkbookData(filtered, selected),
                    `จากข้อมูล: ${filtered.length.toLocaleString()} rows × ${selected.length} cols`
                );
            } catch (e) {
                console.error('FortuneSheet mount failed:', e);
                setSheetEmptyVisible(true);
                setSheetEmptyText(`โหลด FortuneSheet ล้มเหลว:<br><code>${(e && e.message) || e}</code><br><br>ตรวจสอบ network / esm.sh แล้วลองสลับ tab อีกครั้ง`);
            } finally {
                setSheetOverlay(false);
            }
        }

        async function newFromData() {
            if (sheetState.dirty && !confirm('มีการแก้ไขที่ยังไม่ได้บันทึก — สร้าง workbook ใหม่จะทับของเดิม\n\nต้องการต่อ?')) return;
            if (!lastRecords || lastRecords.length === 0) {
                alert('ยังไม่มีข้อมูล — กรุณา Fetch ก่อน');
                return;
            }
            const selected = getSelectedColumns();
            if (selected.length === 0) {
                alert('กรุณาเลือกอย่างน้อย 1 คอลัมน์ใน sidebar Columns');
                return;
            }
            const filtered = applyColumnFilters(lastRecords);
            if (filtered.length > SHEET_PERF_THRESHOLD) {
                if (!confirm(`Dataset มี ${filtered.length.toLocaleString()} rows — อาจช้า\n\nต้องการต่อ?`)) return;
            }
            try {
                setSheetOverlay(true, 'กำลังสร้าง workbook ใหม่...');
                await loadFortuneSheetAssets();
                await new Promise(r => setTimeout(r, 30));
                // Force remount (cleared by mountFortuneSheet)
                sheetState.mounted = false;
                mountFortuneSheet(
                    buildWorkbookData(filtered, selected),
                    `จากข้อมูล: ${filtered.length.toLocaleString()} rows × ${selected.length} cols`
                );
            } catch (e) {
                console.error(e);
                alert('สร้าง workbook ไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
            }
        }

        function tsForFilename() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
        }

        // FortuneSheet's onChange emits its internal `data` (2D matrix)
        // form, which it accepts on input but FortuneSheet's mount logic
        // can render incorrectly if `celldata` is missing. Save/Open both
        // need a sparse `celldata` array to round-trip reliably, and the
        // XLSX exporter reads `celldata` too. This helper synthesizes a
        // `celldata` array from whichever shape the sheet currently holds.
        function extractCelldata(sheet) {
            if (!sheet) return [];
            if (Array.isArray(sheet.celldata) && sheet.celldata.length > 0) {
                return sheet.celldata;
            }
            const matrix = sheet.data;
            if (!Array.isArray(matrix)) return [];
            const out = [];
            for (let r = 0; r < matrix.length; r++) {
                const row = matrix[r];
                if (!Array.isArray(row)) continue;
                for (let c = 0; c < row.length; c++) {
                    const cell = row[c];
                    if (cell == null) continue;
                    // The 2D matrix stores either the `v` object directly
                    // (FortuneSheet's normalized form) or null for empty.
                    if (typeof cell === 'object') {
                        // Skip cells that are truly empty (no v, no m)
                        if (cell.v === undefined && cell.m === undefined &&
                            cell.ct === undefined && cell.f === undefined) {
                            continue;
                        }
                        out.push({ r, c, v: cell });
                    } else if (cell !== '') {
                        // Primitive value (rare): wrap it
                        out.push({ r, c, v: { v: cell, m: String(cell) } });
                    }
                }
            }
            return out;
        }

        // Return a deep-ish clone of `data` where every sheet has a
        // populated `celldata` array. Used for save (so files round-trip)
        // and for open (so FortuneSheet renders from any saved form).
        function normalizeWorkbook(data) {
            if (!Array.isArray(data)) return data;
            return data.map(sheet => {
                if (!sheet || typeof sheet !== 'object') return sheet;
                const celldata = extractCelldata(sheet);
                let maxR = sheet.row || 0;
                let maxC = sheet.column || 0;
                celldata.forEach(c => {
                    if (c.r + 1 > maxR) maxR = c.r + 1;
                    if (c.c + 1 > maxC) maxC = c.c + 1;
                });
                return {
                    ...sheet,
                    celldata,
                    row: Math.max(maxR + 5, sheet.row || 0, 100),
                    column: Math.max(maxC + 3, sheet.column || 0, 26),
                };
            });
        }

        function saveSheetJson() {
            const data = sheetState.currentData;
            if (!data) {
                alert('ยังไม่มี workbook ให้บันทึก');
                return;
            }
            try {
                const normalized = normalizeWorkbook(data);
                const totalCells = normalized.reduce(
                    (n, s) => n + (s.celldata ? s.celldata.length : 0), 0
                );
                if (totalCells === 0) {
                    if (!confirm('Workbook ดูเหมือนไม่มีข้อมูล — บันทึกต่อไหม?')) return;
                }
                const json = JSON.stringify(normalized);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SE_Report_workbook_${tsForFilename()}.fsheet.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                setSheetDirty(false);
                setSheetStatus(`บันทึกแล้ว (${(blob.size / 1024 / 1024).toFixed(2)} MB)`);
            } catch (e) {
                console.error(e);
                alert('บันทึกไม่สำเร็จ: ' + (e && e.message || e));
            }
        }

        function openSheetJson() {
            if (sheetState.dirty && !confirm('มีการแก้ไขที่ยังไม่ได้บันทึก — เปิดไฟล์ใหม่จะทับของเดิม\n\nต้องการต่อ?')) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.style.display = 'none';
            input.addEventListener('change', async () => {
                const file = input.files && input.files[0];
                document.body.removeChild(input);
                if (!file) return;
                try {
                    setSheetOverlay(true, `กำลังอ่านไฟล์ ${file.name}...`);
                    await loadFortuneSheetAssets();
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('รูปแบบไฟล์ไม่ถูกต้อง — คาดว่าเป็น array ของ sheets');
                    }
                    // Normalize legacy / internal-format saves so FortuneSheet
                    // mounts reliably regardless of how the file was produced.
                    const normalized = normalizeWorkbook(data);
                    sheetState.mounted = false;
                    mountFortuneSheet(normalized, `เปิดจากไฟล์: ${file.name}`);
                } catch (e) {
                    console.error(e);
                    alert('เปิดไฟล์ไม่สำเร็จ: ' + (e && e.message || e));
                } finally {
                    setSheetOverlay(false);
                }
            });
            document.body.appendChild(input);
            input.click();
        }

        function saveSheetXlsx() {
            const data = sheetState.currentData;
            if (!data || !data[0]) {
                alert('ยังไม่มี workbook ให้บันทึก');
                return;
            }
            const sheet = data[0];
            // Handle both celldata (sparse, as-built / after Open) and
            // FortuneSheet's internal 2D `data` matrix (after onChange).
            const cells = extractCelldata(sheet);
            if (cells.length === 0) {
                alert('Sheet ว่างเปล่า');
                return;
            }
            try {
                let maxR = 0, maxC = 0;
                cells.forEach(c => {
                    if (c.r > maxR) maxR = c.r;
                    if (c.c > maxC) maxC = c.c;
                });
                const aoa = [];
                for (let r = 0; r <= maxR; r++) {
                    aoa.push(new Array(maxC + 1).fill(''));
                }
                cells.forEach(c => {
                    const v = c.v;
                    if (!v) return;
                    // Prefer displayed/computed value (m); fall back to raw (v)
                    const val = (v.m !== undefined && v.m !== null) ? v.m : v.v;
                    aoa[c.r][c.c] = (val === null || val === undefined) ? '' : val;
                });
                const ws = XLSX.utils.aoa_to_sheet(aoa);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, sheet.name || 'Sheet1');
                XLSX.writeFile(wb, `SE_Report_workbook_${tsForFilename()}.xlsx`);
                setSheetStatus('บันทึก .xlsx แล้ว (สูตรเป็นค่า — lossy)');
            } catch (e) {
                console.error(e);
                alert('บันทึก .xlsx ไม่สำเร็จ: ' + (e && e.message || e));
            }
        }

        document.getElementById('sheetNewBtn').addEventListener('click', newFromData);
        document.getElementById('sheetOpenBtn').addEventListener('click', openSheetJson);
        document.getElementById('sheetSaveBtn').addEventListener('click', saveSheetJson);
        document.getElementById('sheetSaveXlsxBtn').addEventListener('click', saveSheetXlsx);

        window.addEventListener('beforeunload', (e) => {
            if (sheetState.dirty) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // ========== FORM SUBMIT (SSE STREAMING) ==========
        let abortController = null;
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (abortController) abortController.abort();
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            status.className = '';
            status.textContent = '';
            thead.innerHTML = ''; tbody.innerHTML = '';
            table.style.display = 'none';
            btn.disabled = true;
            exportBtn.style.display = 'none';
            lastRecords = null;
            columnFilters = {};

            progressFill.style.width = '0%';
            progressText.textContent = 'Connecting...';
            progressContainer.classList.add('active');

            abortController = new AbortController();
            const formData = new FormData(this);

            try {
                const res = await fetch('/fetch-stream', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal,
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();

                    for (const part of parts) {
                        if (!part.trim()) continue;
                        let eventType = null, dataStr = null;
                        for (const line of part.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
                            else if (line.startsWith('data: ')) dataStr = line.slice(6);
                        }
                        if (!eventType || !dataStr) continue;
                        const payload = JSON.parse(dataStr);

                        if (eventType === 'progress') {
                            const pct = payload.total > 0 ? Math.round((payload.fetched / payload.total) * 100) : 0;
                            progressFill.style.width = pct + '%';
                            progressText.textContent = `Page ${payload.page} — ${payload.fetched.toLocaleString()}/${payload.total.toLocaleString()} records (${pct}%)`;
                        } else if (eventType === 'error') {
                            throw new Error(payload.error);
                        } else if (eventType === 'done') {
                            const records = payload.data;
                            if (!records || records.length === 0) {
                                status.textContent = 'No data found.';
                            } else {
                                lastRecords = records;
                                renderTable();
                                exportBtn.style.display = 'inline-block';
                                const activeView = document.querySelector('input[name=view]:checked').value;
                                switchView(activeView);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    status.textContent = 'Fetch cancelled.';
                } else {
                    status.className = 'error';
                    status.textContent = 'Error: ' + err.message;
                }
            } finally {
                btn.disabled = false;
                progressContainer.classList.remove('active');
                abortController = null;
            }
        });
    </script>
</body>
</html>
